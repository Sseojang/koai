{topic:"인과 추론 기초",d:2,
q:`<p>상관관계(correlation)와 인과관계(causation)의 차이에 대한 설명으로 옳은 것은?</p>
<p class="q-ask">옳은 설명은?</p>`,
hint:"아이스크림 판매량과 익사 사고 수가 양의 상관관계를 보입니다. 아이스크림이 익사를 유발할까요?",
opts:["상관관계가 있으면 반드시 인과관계가 있다",
"상관관계는 두 변수의 공변을 나타내며, 인과관계는 하나가 다른 하나를 변화시킴을 의미한다",
"무작위 통제 실험(RCT)은 인과관계 추론에 적합하지 않다",
"교란 변수(confounding variable)는 상관관계에 영향을 미치지 않는다"],ans:1,
exp:"<strong>상관 ≠ 인과</strong><br>• 상관관계: 두 변수가 함께 변하는 패턴<br>• 인과관계: X의 변화가 Y의 변화를 <strong>직접 유발</strong><br>• 교란 변수(confounding): 두 변수 모두에 영향 → 거짓 상관<br>  예) 기온↑ → 아이스크림 판매↑ & 익사 사고↑<br>• <strong>RCT</strong>(무작위 통제 실험)가 인과관계 추론의 금본위(gold standard)"},

{topic:"심슨의 역설",d:3,
q:`<p>심슨의 역설(Simpson's Paradox)에 대한 설명으로 옳은 것은?</p>
<p class="q-ask">심슨의 역설이란?</p>`,
hint:"전체 데이터에서의 경향과 하위 그룹에서의 경향이 반대가 되는 현상입니다.",
opts:["표본 크기가 클수록 항상 정확한 결론을 얻는다는 법칙이다",
"전체 데이터에서 나타나는 경향이 하위 그룹별로 보면 역전되는 현상이다",
"데이터가 정규분포를 따르지 않을 때 발생하는 오류이다",
"표본 평균이 모평균에 수렴한다는 정리이다"],ans:1,
exp:"<strong>심슨의 역설(Simpson's Paradox)</strong>:<br>• 전체 데이터의 경향 ≠ 하위 그룹별 경향<br>• 교란 변수(lurking variable)가 원인<br>• 예: 약물 A가 전체적으로 효과가 나빠 보이지만, 남녀 각각에서는 A가 더 효과적<br>• 해결: <strong>교란 변수를 통제</strong>하고 하위 그룹별 분석 필요<br>• 데이터 집계 방식에 따라 결론이 달라질 수 있음"},

{topic:"생존 분석",d:2,
q:`<p>생존 분석(Survival Analysis)에서 <strong>중도 절단(censoring)</strong>이 발생하는 상황으로 옳은 것은?</p>
<p class="q-ask">중도 절단이란?</p>`,
hint:"임상 시험에서 연구 종료 시점까지 사건(사망, 재발 등)이 발생하지 않은 환자가 있을 수 있습니다.",
opts:["관측 기간 동안 모든 대상에서 사건이 발생한 경우",
"관측 기간이 끝났지만 사건이 아직 발생하지 않아 정확한 생존 시간을 알 수 없는 경우",
"데이터에 결측값이 없는 경우",
"모든 환자가 동시에 사망한 경우"],ans:1,
exp:"<strong>중도 절단(Censoring)</strong>:<br>• 관측 기간 종료 시 사건 미발생 → 정확한 생존 시간 미관측<br>• 추적 중단(이사, 다른 질환 등)으로 인한 관측 종료도 포함<br>• 생존 분석 특유의 개념으로, 일반 회귀와 구별되는 이유<br>• Kaplan-Meier, Cox 비례위험모형 등이 중도 절단을 처리할 수 있음"},

{topic:"성향 점수 매칭",d:3,
q:`<p>성향 점수 매칭(Propensity Score Matching)의 목적으로 가장 옳은 것은?</p>
<p class="q-ask">성향 점수 매칭의 목적은?</p>`,
hint:"관찰 연구(observational study)에서 처리군(treatment)과 대조군(control)의 특성 차이를 줄이는 방법입니다.",
opts:["데이터의 차원을 축소한다",
"관찰 연구에서 처리군과 대조군의 공변량 분포를 맞추어 교란 효과를 줄인다",
"랜덤 포레스트의 특성 중요도를 계산한다",
"결측 데이터를 대체(imputation)한다"],ans:1,
exp:"<strong>성향 점수 매칭(PSM)</strong>:<br>• 성향 점수 = 공변량 X가 주어졌을 때 처리를 받을 확률 P(T=1|X)<br>• 성향 점수가 유사한 처리군-대조군 쌍을 매칭<br>• <strong>교란 변수의 효과를 줄여</strong> 관찰 연구에서 인과 추론에 접근<br>• RCT가 불가능한 상황에서 유용한 준실험적 방법"},

{topic:"본페로니 교정",d:2,
q:`<p>다중 검정(multiple testing)에서 본페로니 교정(Bonferroni correction)의 방법으로 옳은 것은?</p>
<p class="q-ask">본페로니 교정이란?</p>`,
hint:"유의수준 α를 검정 횟수로 나누는 방법입니다.",
opts:["검정 횟수에 관계없이 유의수준을 0.05로 고정한다",
"유의수준 α를 검정 횟수 m으로 나누어 각 검정의 유의수준을 α/m으로 설정한다",
"검정 횟수가 늘수록 유의수준을 높인다",
"P-value를 합산하여 하나의 검정으로 통합한다"],ans:1,
exp:"<strong>본페로니 교정</strong>:<br>• 다중 검정 시 제1종 오류(false positive) 증가 문제 해결<br>• 각 검정의 유의수준 = <strong>α/m</strong> (m = 검정 횟수)<br>• 예: α=0.05, 10회 검정 → 각 검정에서 0.005를 사용<br>• 가족별 오류율(FWER)을 α 이하로 통제<br>• 단점: <strong>보수적</strong>(검정 횟수가 많으면 검정력 크게 감소)"},

{topic:"효과 크기 Cohen's d",d:1,
q:`<p>효과 크기(Effect Size)의 지표인 Cohen's d에 대한 설명으로 옳은 것은?</p>
<p class="q-ask">Cohen's d란?</p>`,
hint:"Cohen's d = (두 그룹의 평균 차이) / (합동 표준편차). P-value와는 다른 정보를 제공합니다.",
opts:["P-value와 동일한 정보를 제공한다",
"두 그룹 평균 차이를 표준편차 단위로 표준화한 값이다",
"표본 크기에 따라 값이 크게 변한다",
"항상 0 이상 1 이하의 값을 가진다"],ans:1,
exp:"<strong>Cohen's d</strong> = (M₁ − M₂) / s_pooled<br>• 두 그룹의 평균 차이를 <strong>합동 표준편차로 표준화</strong><br>• |d| ≈ 0.2: 작은 효과, 0.5: 중간, 0.8: 큰 효과<br>• P-value는 표본 크기에 민감하지만, <strong>효과 크기는 실질적 차이의 크기</strong>를 나타냄<br>• 음수도 가능 (M₁ < M₂일 때), 1을 초과할 수도 있음"},

{topic:"검정력 분석",d:2,
q:`<p>통계적 검정력(statistical power)에 대한 설명으로 옳은 것은?</p>
<p class="q-ask">검정력이란?</p>`,
hint:"검정력 = 1 - β = 1 - (제2종 오류 확률). 실제 효과가 있을 때 이를 탐지할 확률입니다.",
opts:["제1종 오류(α)를 범할 확률이다",
"귀무가설이 거짓일 때 이를 올바르게 기각할 확률(1-β)이다",
"표본 크기와 무관하다",
"효과 크기가 클수록 검정력이 낮아진다"],ans:1,
exp:"<strong>검정력(Power)</strong> = 1 − β = P(H₀ 기각 | H₁ 참)<br>• 실제 효과가 <strong>있을 때 이를 탐지할 확률</strong><br>• 검정력에 영향을 미치는 요인:<br>  - 표본 크기 ↑ → 검정력 ↑<br>  - 효과 크기 ↑ → 검정력 ↑<br>  - 유의수준 α ↑ → 검정력 ↑<br>• 일반적으로 0.80 이상을 목표로 설정"},

/* ═══════════════════════════════════════════════════
   2-1. 신경망 (Q26 ~ Q31)
   ═══════════════════════════════════════════════════ */
{topic:"Kaiming 초기화",d:2,
q:`<p>Kaiming(He) 초기화가 Xavier 초기화보다 ReLU 활성화 함수에 더 적합한 이유로 옳은 것은?</p>
<p class="q-ask">Kaiming 초기화가 ReLU에 적합한 이유는?</p>`,
hint:"ReLU는 음의 입력을 0으로 만들므로 출력 분산이 절반으로 줄어듭니다. 이를 보상해야 합니다.",
opts:["Xavier는 가중치를 항상 0으로 초기화하기 때문이다",
"ReLU가 음의 값을 차단하여 분산이 줄어드는 것을 보상하기 위해 분산을 2/n으로 설정한다",
"Kaiming 초기화는 학습률을 자동으로 조절한다",
"Xavier 초기화는 ReLU에서 그래디언트가 폭발하기 때문이다"],ans:1,
exp:"<strong>Kaiming(He) 초기화</strong>:<br>• Xavier: Var(W) = 1/n (선형·tanh·sigmoid에 적합)<br>• <strong>Kaiming: Var(W) = 2/n</strong><br>• ReLU는 음의 입력 → 0 → 출력 분산이 약 1/2로 감소<br>• 2/n으로 설정하여 이 분산 감소를 <strong>보상</strong><br>• 깊은 ReLU 네트워크에서 신호가 안정적으로 전파됨"},

{topic:"Lookahead 옵티마이저",d:3,
q:`<p>Lookahead 옵티마이저에 대한 설명으로 옳은 것은?</p>
<p class="q-ask">Lookahead의 핵심 아이디어는?</p>`,
hint:"Lookahead는 내부(inner) 옵티마이저와 느린(slow) 가중치를 함께 사용합니다.",
opts:["학습률을 자동으로 0으로 감소시킨다",
"내부 옵티마이저로 k 스텝 진행한 후 slow weight와 보간(interpolation)하여 안정성을 높인다",
"그래디언트를 사용하지 않는 옵티마이저이다",
"배치 크기를 자동으로 조절하는 기법이다"],ans:1,
exp:"<strong>Lookahead 옵티마이저</strong>:<br>• <strong>Fast weight</strong>: 내부 옵티마이저(SGD, Adam 등)로 k 스텝 업데이트<br>• <strong>Slow weight</strong>: fast weight 방향으로 α 비율만큼 보간<br>• slow_weight += α × (fast_weight − slow_weight)<br>• 탐색(exploration)과 안정성(stability) 사이의 균형<br>• 기존 옵티마이저를 감싸서(wrapper) 사용 가능"},

{topic:"층 동결 전이학습",d:1,
q:`<p>전이학습(Transfer Learning)에서 사전학습된 모델의 하위 층(lower layers)을 동결(freeze)하는 이유로 가장 옳은 것은?</p>
<p class="q-ask">하위 층을 동결하는 이유는?</p>`,
hint:"CNN에서 하위 층은 에지, 텍스처 등 일반적 특성을 학습합니다.",
opts:["하위 층은 일반적 특성(에지, 패턴)을 학습하므로 도메인에 관계없이 유용하다",
"하위 층의 가중치는 학습할 수 없기 때문이다",
"동결하면 모델의 정확도가 항상 올라간다",
"상위 층의 가중치가 업데이트되는 것을 방지하기 위해서이다"],ans:0,
exp:"전이학습에서 하위 층 동결:<br>• 하위 층: <strong>에지, 텍스처, 색상</strong> 등 <strong>범용적 특성</strong> 학습 → 대부분의 태스크에 유용<br>• 상위 층: 태스크 특화 특성 → 새로운 태스크에 맞게 재학습 필요<br>• 동결 장점: 과대적합 방지, 학습 속도 향상, 적은 데이터로도 효과적<br>• 데이터가 충분하면 점진적 동결 해제(unfreezing)도 가능"},

{topic:"혼합 정밀도 학습",d:2,
q:`<p>혼합 정밀도 학습(Mixed Precision Training)에 대한 설명으로 옳은 것은?</p>
<p class="q-ask">혼합 정밀도 학습이란?</p>`,
hint:"FP32와 FP16을 함께 사용하여 학습 속도를 높이는 기법입니다.",
opts:["모든 연산을 FP64(64비트)로 수행하여 정확도를 높인다",
"순전파를 FP16으로, 가중치 업데이트는 FP32로 수행하여 속도와 정확도를 모두 확보한다",
"FP16만 사용하므로 정확도 손실이 크다",
"CPU에서만 사용할 수 있는 기법이다"],ans:1,
exp:"<strong>혼합 정밀도 학습(Mixed Precision Training)</strong>:<br>• <strong>순전파/역전파: FP16</strong> → 메모리 절약, 연산 속도 향상<br>• <strong>가중치 마스터 카피: FP32</strong> → 수치 안정성 유지<br>• Loss Scaling으로 FP16의 작은 그래디언트 소실 방지<br>• GPU의 Tensor Core 활용으로 2~3배 속도 향상 가능<br>• PyTorch: <code>torch.cuda.amp</code> 모듈로 간편 적용"},

{topic:"신경 구조 탐색",d:2,
q:`<p>신경 구조 탐색(NAS, Neural Architecture Search)의 목적으로 옳은 것은?</p>
<p class="q-ask">NAS의 목적은?</p>`,
hint:"사람이 수동으로 설계하던 모델 구조를 자동으로 탐색하는 방법입니다.",
opts:["하이퍼파라미터(학습률, 배치 크기)만 최적화한다",
"신경망의 구조(층 수, 연결 방식 등)를 자동으로 탐색하여 최적 아키텍처를 찾는다",
"학습 데이터를 자동으로 생성한다",
"사전학습된 모델의 가중치를 초기화한다"],ans:1,
exp:"<strong>NAS (Neural Architecture Search)</strong>:<br>• 신경망의 <strong>구조 자체를 자동 탐색</strong><br>• 탐색 대상: 층 수, 필터 크기, 연결 방식, 활성화 함수 등<br>• 탐색 전략: 강화학습, 진화 알고리즘, 미분 가능 NAS(DARTS) 등<br>• NASNet, EfficientNet 등이 NAS로 발견된 대표 아키텍처<br>• 계산 비용이 매우 높을 수 있음"},

{topic:"복권 가설",d:3,
q:`<p>복권 가설(Lottery Ticket Hypothesis)의 핵심 주장으로 옳은 것은?</p>
<p class="q-ask">복권 가설이란?</p>`,
hint:"큰 신경망 내에 작지만 효과적인 '당첨 티켓' 부분 네트워크가 존재한다는 가설입니다.",
opts:["큰 신경망을 훈련하면 항상 최적 성능을 달성한다",
"밀집(dense) 네트워크 내에 초기화부터 훈련 가능한 희소 서브네트워크(winning ticket)가 존재한다",
"가지치기(pruning)를 하면 항상 성능이 향상된다",
"모든 파라미터가 동등하게 중요하다"],ans:1,
exp:"<strong>복권 가설(Lottery Ticket Hypothesis)</strong>:<br>• 큰 밀집 네트워크 내에 <strong>'당첨 티켓'(winning ticket)</strong>이 존재<br>• 이 서브네트워크는 <strong>원래 초기화 값</strong>으로도 전체 네트워크와 유사한 성능 달성 가능<br>• 가지치기 후 재초기화 → 학습 → 반복으로 발견<br>• 모델 압축과 효율적 학습에 대한 이론적 근거 제공"},

/* ═══════════════════════════════════════════════════
   2-2. 딥러닝 (Q32 ~ Q40)
   ═══════════════════════════════════════════════════ */
{topic:"Mamba 상태 공간 모델",d:3,
q:`<p>Mamba(선택적 상태 공간 모델)가 Transformer 대비 갖는 주요 장점으로 옳은 것은?</p>
<p class="q-ask">Mamba의 장점은?</p>`,
hint:"Transformer의 셀프 어텐션은 시퀀스 길이의 제곱에 비례하는 계산 비용이 듭니다. Mamba는 이를 어떻게 해결할까요?",
opts:["항상 Transformer보다 높은 정확도를 보인다",
"시퀀스 길이에 대해 선형 시간 복잡도를 가지며, 긴 시퀀스에서 효율적이다",
"어텐션 메커니즘을 사용하므로 Transformer의 일종이다",
"GPU 없이도 학습이 가능하다"],ans:1,
exp:"<strong>Mamba</strong> (Selective State Space Model):<br>• <strong>선형 시간 복잡도</strong> O(n) vs Transformer의 O(n²)<br>• 선택적 메커니즘(selection mechanism)으로 입력에 따라 SSM 파라미터를 동적 조절<br>• 긴 시퀀스(수천~수만 토큰)에서 메모리/속도 효율적<br>• 어텐션이 아닌 <strong>상태 공간 모델(SSM)</strong> 기반<br>• 하드웨어 최적화된 구현으로 실용적 속도 확보"},

{topic:"CLIP 대조 학습",d:2,
q:`<p>CLIP(Contrastive Language-Image Pre-training)의 학습 방식으로 옳은 것은?</p>
<p class="q-ask">CLIP의 학습 방법은?</p>`,
hint:"CLIP은 이미지와 텍스트를 같은 임베딩 공간에 매핑합니다. 매칭되는 쌍은 가깝게, 그렇지 않은 쌍은 멀게 학습합니다.",
opts:["이미지만 사용하여 자기 지도 학습을 수행한다",
"이미지-텍스트 쌍을 대조 학습(contrastive learning)으로 같은 임베딩 공간에 매핑한다",
"텍스트를 이미지로 생성하는 생성 모델이다",
"레이블된 분류 데이터셋으로만 학습한다"],ans:1,
exp:"<strong>CLIP</strong>의 학습:<br>• <strong>이미지 인코더</strong>와 <strong>텍스트 인코더</strong>를 동시에 학습<br>• 매칭되는 (이미지, 텍스트) 쌍의 유사도를 <strong>최대화</strong><br>• 매칭되지 않는 쌍의 유사도를 <strong>최소화</strong> (대조 손실)<br>• 제로샷(zero-shot) 분류 가능: 임의의 텍스트 레이블로 분류<br>• 대규모 웹 데이터(4억 쌍)로 학습"},

{topic:"DPO 정렬",d:3,
q:`<p>DPO(Direct Preference Optimization)가 RLHF에 비해 갖는 장점으로 옳은 것은?</p>
<p class="q-ask">DPO의 장점은?</p>`,
hint:"RLHF는 보상 모델 학습 → 강화학습(PPO)의 두 단계를 거칩니다. DPO는 이를 단순화합니다.",
opts:["항상 RLHF보다 높은 성능을 보장한다",
"별도의 보상 모델 없이 선호 데이터로 직접 정책을 최적화하여 학습이 간단하다",
"강화학습 알고리즘을 사용하므로 RLHF와 동일하다",
"인간 피드백 데이터가 전혀 필요 없다"],ans:1,

opts:["재구성 손실(reconstruction loss)만으로 구성된다",
"재구성 손실 + 잠재 분포와 사전 분포 사이의 KL 발산으로 구성된다",

"교차 엔트로피 손실만으로 구성된다"],ans:1,
exp:"<strong>VAE의 ELBO</strong>:<br>• <strong>재구성 손실</strong>: 입력을 얼마나 잘 복원하는지 (likelihood 최대화)<br>• <strong>KL 발산</strong>: 잠재 분포 q(z|x)가 사전 분포 p(z)에 가까워지도록 정규화<br>ELBO = E[log p(x|z)] − D_KL(q(z|x) || p(z))<br>• 두 항의 균형으로 의미 있는 잠재 공간 학습<br>• KL 항이 잠재 공간의 연속성과 정규성을 보장"},

function gcd(a,b){
  while(b){const t=b;b=a%b;a=t;}
  return a;
}
function objectiveStride(poolLength, seed){
  const candidates=[5,3,7,11,13];
  for(let i=0;i<candidates.length;i++){
    const stride=candidates[(seed+i)%candidates.length]%poolLength;
    if(stride>0&&gcd(stride,poolLength)===1) return stride;
  }
  return 1;
}
function buildObjectiveSet(mixIndex){
  const data=[];
  const roundStarts=[0,5,10,3,8,1,6,11,4,9,2,7];
  SECTIONS.slice(0,6).forEach((sec, secIdx)=>{
    if(secIdx===0){
      const codePool=KOAI_OBJECTIVE_BANK[0].map(cloneQuestion);
      const conceptPool=KOAI_PROGRAMMING_CONCEPT_BANK.map(cloneQuestion);
      const codeStride=objectiveStride(codePool.length,mixIndex);
      const conceptStride=objectiveStride(conceptPool.length,mixIndex+4);
      const codeOffset=roundStarts[mixIndex%roundStarts.length]%codePool.length;
      const conceptOffset=(roundStarts[(mixIndex+3)%roundStarts.length]+mixIndex)%conceptPool.length;
      const codeQuestions=Array.from({length:2},(_,i)=>cloneQuestion(codePool[(codeOffset+i*codeStride)%codePool.length]));
      const conceptQuestions=Array.from({length:sec.count-2},(_,i)=>cloneQuestion(conceptPool[(conceptOffset+i*conceptStride)%conceptPool.length]));
      const codePositions=[
        [0,3],[1,4],[2,5],[0,4],[1,5],[0,2]
      ][mixIndex%6];
      let codeIdx=0;
      let conceptIdx=0;
      for(let i=0;i<sec.count;i++){
        data.push(codePositions.includes(i)?codeQuestions[codeIdx++]:conceptQuestions[conceptIdx++]);
      }
      return;
    }
    const pool=KOAI_OBJECTIVE_BANK[secIdx].map(cloneQuestion);
    const stride=objectiveStride(pool.length,mixIndex+secIdx*2);
    const offset=(roundStarts[mixIndex%roundStarts.length]+secIdx*3+mixIndex*secIdx)%pool.length;
    for(let i=0;i<sec.count;i++) data.push(cloneQuestion(pool[(offset+i*stride)%pool.length]));
  });
  return data;
}
function buildMixedRound(roundId, mixIndex){
  return {
    id:roundId,
    label:`제${roundId}회`,
    title:`KOAI 2026 예상 기출문제 · 제${roundId}회`,
    source:'generated',
    data: buildObjectiveSet(mixIndex)
  };
}
for(let i=0;i<7;i++) ROUNDS.push(buildMixedRound(6+i,5+i));
ROUNDS.forEach((round, idx)=>{
  round.data.splice(0, 40, ...buildObjectiveSet(idx));
});

exp:`<strong>채점 포인트</strong><br>• 검증/테스트 정보 또는 예측 시점에 알 수 없는 정보가 학습에 들어가는 상황을 설명<br>• 전체 데이터 스케일링은 검증 데이터 통계가 학습 전처리에 반영됨<br>• train split 이후 학습 데이터로만 fit, 검증/테스트에는 transform만 적용<br>• Pipeline을 cross-validation에 넣으면 각 fold마다 전처리 fit 범위가 분리됨`},

{topic:"불균형 분류 평가",d:2,type:'essay',
q:`<p>양성 클래스 비율이 2%인 이진 분류 문제에서 모델 A의 정확도는 98%이다. 다음 물음에 답하시오.</p>
<p>(1) 정확도만으로 모델 성능을 판단하기 어려운 이유를 설명하시오.</p>
<p>(2) Precision, Recall, F1, PR-AUC 중 최소 두 가지를 골라 왜 유용한지 설명하시오.</p>
<p>(3) 임계값을 낮추면 일반적으로 precision과 recall이 어떻게 변하는지 설명하시오.</p>`,
exp:`<strong>채점 포인트</strong><br>• 모든 샘플을 음성으로 예측해도 높은 정확도가 나올 수 있음을 지적<br>• Recall은 실제 양성을 얼마나 찾는지, Precision은 양성 예측의 신뢰도를 나타냄<br>• F1은 precision-recall 균형, PR-AUC는 양성 클래스 성능 해석에 적합<br>• 임계값을 낮추면 양성 예측이 늘어 recall은 증가하고 precision은 감소하는 경향`},

{topic:"CNN과 전이학습",d:2,type:'essay',
q:`<p>이미지 분류 모델을 적은 학습 데이터로 만들어야 한다. 사전학습된 CNN을 활용하는 전이학습 전략을 설계하시오.</p>
<p>(1) 하위 층을 동결하고 상위 층 또는 분류기만 학습하는 이유를 설명하시오.</p>
<p>(2) 데이터 증강을 두 가지 이상 제시하고 과대적합 완화와의 관계를 설명하시오.</p>
<p>(3) 검증 성능이 정체될 때 적용할 수 있는 학습 전략을 두 가지 제시하시오.</p>`,
exp:`<strong>채점 포인트</strong><br>• 하위 층은 에지, 질감 등 범용 특징을 학습한다는 설명<br>• 좌우 반전, crop, color jitter 등 의미를 해치지 않는 증강 제시<br>• 조기 종료, 학습률 감소, 일부 층 unfreeze, weight decay, dropout 등을 상황에 맞게 설명`},

{topic:"Seq2Seq와 Attention",d:3,type:'essay',
q:`<p>기계번역 모델을 인코더-디코더 구조로 설계한다고 하자. 다음 물음에 답하시오.</p>
<p>(1) 인코더와 디코더의 역할을 설명하시오.</p>
<p>(2) Teacher Forcing이 무엇이며 학습에 어떤 장점과 단점이 있는지 설명하시오.</p>
<p>(3) 어텐션이 기본 Seq2Seq의 어떤 한계를 완화하는지 설명하시오.</p>`,
exp:`<strong>채점 포인트</strong><br>• 인코더는 원문을 문맥 표현으로 변환하고 디코더는 목표 문장을 생성<br>• Teacher Forcing은 이전 정답 토큰을 디코더 입력으로 사용해 수렴을 안정화<br>• 추론 시 자기 예측을 쓰기 때문에 exposure bias가 생길 수 있음<br>• 어텐션은 고정 길이 벡터 병목을 줄이고 필요한 원문 위치에 집중하게 함`},

{topic:"LLM 적용 전략",d:2,type:'essay',
q:`<p>대규모 언어 모델을 기업 내부 문서 질의응답 시스템에 적용하려고 한다. 다음 물음에 답하시오.</p>
<p>(1) 제로샷/퓨샷 프롬프팅, RAG, 미세조정의 차이를 설명하시오.</p>
<p>(2) 내부 문서가 자주 바뀌는 경우 RAG가 유리한 이유를 설명하시오.</p>
<p>(3) 모델 응답 품질을 평가할 때 확인해야 할 항목을 세 가지 제시하시오.</p>`,
exp:`<strong>채점 포인트</strong><br>• 프롬프팅은 가중치 변경 없이 지시/예시로 해결, RAG는 검색 문맥을 붙여 답변, 미세조정은 파라미터를 업데이트<br>• RAG는 문서 업데이트를 인덱스 갱신으로 반영할 수 있고 출처 기반 답변에 유리<br>• 정확성, 근거성, 최신성, 환각, 보안/개인정보, 응답 일관성 등을 평가 항목으로 제시`}
],
[
{topic:"군집화 방법 비교",d:2,type:'essay',
q:`<p>레이블이 없는 고객 행동 데이터를 군집화하려고 한다. 다음 물음에 답하시오.</p>
<p>(1) K-means, DBSCAN, 계층적 군집화의 핵심 아이디어와 장단점을 비교하시오.</p>
<p>(2) 비볼록 형태의 군집과 노이즈가 많은 데이터에서는 어떤 방법이 더 적합한지 설명하시오.</p>
<p>(3) 정답 레이블이 없을 때 군집 품질을 평가할 수 있는 내부 지표를 하나 이상 제시하시오.</p>`,
exp:`<strong>채점 포인트</strong><br>• K-means는 중심 기반, 빠르지만 K와 구형 군집 가정에 민감<br>• DBSCAN은 밀도 기반, 노이즈와 비볼록 군집에 강하지만 eps/min_samples 설정이 중요<br>• 계층적 군집화는 덴드로그램 해석이 가능하나 큰 데이터에 부담<br>• 실루엣 점수, Davies-Bouldin 등 내부 지표 제시`},

{topic:"앙상블 모델 설계",d:2,type:'essay',
q:`<p>분류 문제에서 단일 의사결정 트리보다 안정적인 모델을 만들기 위해 앙상블을 사용하려고 한다. 다음 물음에 답하시오.</p>
<p>(1) Random Forest와 Gradient Boosting의 학습 방식 차이를 설명하시오.</p>
<p>(2) Random Forest의 특성 중요도가 어떤 방식으로 계산되는지 설명하시오.</p>
<p>(3) 스태킹(Stacking)을 사용할 때 데이터 누수를 피하기 위한 예측 생성 절차를 설명하시오.</p>`,
exp:`<strong>채점 포인트</strong><br>• Random Forest는 bootstrap 샘플과 무작위 특성으로 여러 트리를 독립 학습<br>• Gradient Boosting은 이전 모델의 잔차/음의 그래디언트를 순차적으로 보완<br>• 불순도 감소량 평균 또는 순열 중요도 개념 설명<br>• 스태킹은 out-of-fold 예측으로 메타 모델 학습 데이터를 만들어야 함`},

{topic:"객체 탐지 모델",d:3,type:'essay',
q:`<p>컴퓨터 비전에서 YOLO 계열 모델과 DETR은 모두 객체 탐지에 사용된다. 다음 물음에 답하시오.</p>
<p>(1) YOLO 계열 모델의 단일 단계 탐지 방식과 DETR의 집합 예측 방식을 비교하시오.</p>
<p>(2) DETR이 트랜스포머를 사용하는 이유와 장점을 설명하시오.</p>
<p>(3) 객체 탐지 모델을 평가할 때 mAP가 어떤 의미를 갖는지 설명하시오.</p>`,
exp:`<strong>채점 포인트</strong><br>• YOLO는 이미지를 격자/anchor 또는 anchor-free 방식으로 한 번에 예측하는 실시간 탐지에 강점<br>• DETR은 object query와 attention을 이용해 객체 집합을 직접 예측하고 중복 예측 문제를 매칭으로 처리<br>• mAP는 여러 IoU/클래스 기준에서 precision-recall 성능을 평균한 탐지 성능 지표`},

{topic:"자기지도 학습",d:2,type:'essay',
q:`<p>라벨이 부족한 상황에서 이미지 또는 오디오 인코더를 학습하기 위해 자기지도 학습을 사용하려고 한다. 다음 물음에 답하시오.</p>
<p>(1) 자기지도 학습이 지도학습과 다른 점을 설명하시오.</p>
<p>(2) SimCLR/MoCo 같은 대조 학습과 MAE 같은 마스킹 기반 학습의 아이디어를 비교하시오.</p>
<p>(3) HuBERT 같은 오디오 자기지도 인코더가 마스킹과 의사 레이블을 어떻게 활용하는지 설명하시오.</p>`,
exp:`<strong>채점 포인트</strong><br>• 사람이 붙인 라벨 대신 데이터 자체에서 학습 신호를 만든다는 설명<br>• 대조 학습은 같은 샘플의 증강 view를 가깝게, 다른 샘플을 멀게 학습<br>• 마스킹 기반 학습은 가려진 패치/프레임/토큰을 복원 또는 예측<br>• HuBERT는 일부 오디오 프레임을 마스킹하고 클러스터 기반 의사 레이블을 예측`},

{topic:"오토인코더 이상 탐지",d:2,type:'essay',
q:`<p>정상 데이터만 충분히 있고 이상 데이터는 거의 없는 설비 센서 데이터에서 이상 탐지를 수행하려고 한다. 다음 물음에 답하시오.</p>
<p>(1) 오토인코더 기반 이상 탐지의 원리를 설명하시오.</p>
<p>(2) 재구성 오차 임계값을 어떻게 정할 수 있는지 설명하시오.</p>
<p>(3) 실제 운영에서 오탐(false positive)과 미탐(false negative)의 trade-off를 어떻게 조정할 수 있는지 설명하시오.</p>`,
exp:`<strong>채점 포인트</strong><br>• 정상 패턴을 잘 복원하도록 학습하고, 이상 입력은 재구성 오차가 커진다는 설명<br>• 검증 데이터 오차 분포의 상위 분위수, 도메인 비용, 라벨 일부를 활용한 임계값 설정<br>• 임계값을 낮추면 recall은 오르지만 오탐 증가, 높이면 오탐 감소 but 미탐 증가`}
],
[
{topic:"모델 평가와 중첩 교차검증",d:3,type:'essay',
q:`<p>여러 모델과 하이퍼파라미터를 비교해 최종 모델을 선택하려고 한다. 다음 물음에 답하시오.</p>
<p>(1) 테스트 셋으로 반복 비교하며 모델을 고르면 어떤 문제가 생기는지 설명하시오.</p>
<p>(2) 중첩 교차검증(nested cross-validation)의 내부 루프와 외부 루프 역할을 설명하시오.</p>
<p>(3) 최종 보고 성능을 신뢰할 수 있게 만들기 위한 데이터 분할 원칙을 제시하시오.</p>`,
exp:`<strong>채점 포인트</strong><br>• 테스트 셋에 모델 선택이 과적합되어 성능이 낙관적으로 추정됨<br>• 내부 루프는 하이퍼파라미터 튜닝, 외부 루프는 선택 절차 전체의 일반화 성능 추정<br>• 테스트 셋은 최종 1회 평가에만 사용하고 검증/교차검증으로 선택 수행`},

{topic:"차원 축소와 시각화",d:2,type:'essay',
q:`<p>고차원 임베딩 데이터를 2차원으로 시각화하고 분석하려고 한다. 다음 물음에 답하시오.</p>
<p>(1) PCA와 t-SNE의 목적과 해석상의 차이를 설명하시오.</p>
<p>(2) t-SNE 결과에서 군집 간 거리와 축 값을 해석할 때 주의할 점을 설명하시오.</p>
<p>(3) 차원 축소를 모델 학습 전 전처리로 사용할 때 데이터 누수를 피하는 방법을 설명하시오.</p>`,
exp:`<strong>채점 포인트</strong><br>• PCA는 분산을 최대 보존하는 선형 변환, t-SNE는 국소 이웃 구조 보존에 강한 비선형 시각화<br>• t-SNE의 절대 좌표와 군집 간 거리는 직접적인 의미가 약함<br>• 차원 축소 모델도 학습 데이터로만 fit하고 검증/테스트에는 transform만 적용`},

{topic:"PyTorch 학습 루프",d:2,type:'essay',
q:`<p>PyTorch로 신경망을 학습하는 루프를 작성할 때 다음 항목이 왜 필요한지 설명하시오.</p>
<p>(1) optimizer.zero_grad()</p>
<p>(2) loss.backward()</p>
<p>(3) optimizer.step()</p>
<p>(4) model.train()과 model.eval()을 구분해야 하는 이유</p>`,
exp:`<strong>채점 포인트</strong><br>• PyTorch는 그래디언트를 누적하므로 매 반복 zero_grad가 필요<br>• backward는 계산 그래프를 역방향으로 순회해 그래디언트를 계산<br>• step은 계산된 그래디언트로 파라미터를 업데이트<br>• Dropout/BatchNorm은 학습과 추론 동작이 다르므로 train/eval 모드 구분 필요`},

{topic:"생성 모델 비교",d:3,type:'essay',
q:`<p>GAN과 확산 모델은 모두 생성 모델이지만 학습 방식과 생성 방식이 다르다. 다음 물음에 답하시오.</p>
<p>(1) GAN의 생성자와 판별자가 어떤 미니맥스 게임을 하는지 설명하시오.</p>
<p>(2) 확산 모델의 정방향/역방향 과정을 GAN과 비교하시오.</p>
<p>(3) 두 모델의 장단점을 안정성, 샘플 품질, 생성 속도 관점에서 비교하시오.</p>`,
exp:`<strong>채점 포인트</strong><br>• GAN은 생성자가 판별자를 속이고 판별자는 진짜/가짜를 구분하도록 경쟁<br>• 확산 모델은 고정된 노이즈 추가 과정과 학습된 디노이징 역과정을 사용<br>• GAN은 빠른 샘플링이 가능하지만 불안정/모드 붕괴 가능, 확산 모델은 안정적이고 품질이 좋지만 반복 샘플링이 느릴 수 있음`},

{topic:"Transformer 위치 정보",d:2,type:'essay',
q:`<p>트랜스포머 기반 모델에서 위치 정보는 중요한 설계 요소이다. 다음 물음에 답하시오.</p>
<p>(1) 셀프 어텐션만으로는 왜 토큰 순서를 구분하기 어려운지 설명하시오.</p>
<p>(2) 절대 위치 인코딩과 학습 가능한 위치 임베딩의 차이를 설명하시오.</p>
<p>(3) 길이가 긴 문서에서 위치 정보와 attention 계산량이 어떤 문제가 될 수 있는지 설명하시오.</p>`,

{topic:"Softmax와 Cross Entropy 구현",d:3,type:'essay',
q:`<p>NumPy만 사용해 다중 클래스 분류의 softmax와 cross entropy loss를 계산하려고 한다. 다음 물음에 답하시오.</p>
<p>(1) softmax 계산 시 overflow를 방지하기 위해 어떤 처리를 해야 하는지 설명하시오.</p>
<p>(2) logits shape이 (n, c), 정답 레이블 shape이 (n,)일 때 평균 cross entropy를 계산하는 절차를 설명하거나 코드로 작성하시오.</p>
<p>(3) 예측 확률이 정답 클래스에 가까워질수록 loss가 어떻게 변하는지 설명하시오.</p>`,

loss = -np.log(prob[np.arange(len(y)), y] + 1e-12).mean()</pre>
<strong>채점 포인트</strong>: max subtraction, 정답 클래스 확률 인덱싱, 음의 로그 평균, 확률이 1에 가까울수록 loss는 0에 가까워짐`},

const BASE_DESCRIPTIVE_SETS=DESCRIPTIVE_SETS.slice(0,5);
while(DESCRIPTIVE_SETS.length<ROUNDS.length){
  const mixIndex=DESCRIPTIVE_SETS.length-BASE_DESCRIPTIVE_SETS.length;
  const cycle=Math.floor(mixIndex/BASE_DESCRIPTIVE_SETS.length);
  DESCRIPTIVE_SETS.push(Array.from({length:5},(_,qIdx)=>{
    const sourceSet=BASE_DESCRIPTIVE_SETS[(mixIndex+qIdx+cycle)%BASE_DESCRIPTIVE_SETS.length];
    const sourceQuestion=sourceSet[(mixIndex*2+qIdx*3+cycle)%sourceSet.length];
    return {...sourceQuestion};
  }));
}

ROUNDS.forEach((round, idx)=>{
  round.data.splice(40, 5, ...DESCRIPTIVE_SETS[idx]);
});

let currentRoundIndex=0;
let DATA=ROUNDS[0].data;
let cq=0;
let submitted=false;
let ST=emptyState();
const STORE_PREFIX='koai2026-practice-round-';

function emptyState(){return Array.from({length:TOTAL},()=>({sel:null}));}
function roundKey(idx=currentRoundIndex){return STORE_PREFIX+ROUNDS[idx].id+'v1';}
function currentRound(){return ROUNDS[currentRoundIndex];}
function roundState(idx){
  try{
    const d=JSON.parse(localStorage.getItem(roundKey(idx)));
    if(d&&Array.isArray(d.ST)&&d.ST.length===TOTAL) return d;
  }catch(e){}
  return {cq:0,submitted:false,ST:emptyState()};
}
function saveState(){localStorage.setItem(roundKey(),JSON.stringify({cq,submitted,ST}));}
function loadState(){
  const d=roundState(currentRoundIndex);
  cq=Number.isInteger(d.cq)?Math.max(0,Math.min(TOTAL-1,d.cq)):0;
  ST=d.ST;
  submitted=!!d.submitted;
}

function isAnswered(i){
  const s=ST[i];
  if(DATA[i].type==='sa'||DATA[i].type==='essay') return s.sel!==null&&String(s.sel).trim()!=='';
  return s.sel!==null;
}
function isEssay(i){return DATA[i].type==='essay';}
function isAutoGraded(i){return !isEssay(i);}
function isCorrect(i){
  const q=DATA[i],s=ST[i];
  if(q.type==='essay') return false;
  if(q.type==='sa'){
    if(!s.sel) return false;
    const input=String(s.sel).trim().toLowerCase().replace(/\s+/g,'');
    return q.ans.some(a=>String(a).toLowerCase().replace(/\s+/g,'')===input);
  }
  return s.sel===q.ans;
}
function autoTotal(){return DATA.filter((_,i)=>isAutoGraded(i)).length;}
function autoAnswered(){return ST.filter((_,i)=>isAutoGraded(i)&&isAnswered(i)).length;}
function essayTotal(){return DATA.filter((_,i)=>isEssay(i)).length;}
function autoCorrect(){return ST.filter((_,i)=>isAutoGraded(i)&&isCorrect(i)).length;}
function essayAnswered(){return ST.filter((_,i)=>isEssay(i)&&isAnswered(i)).length;}
function calcProgress(idx){
  const prevData=DATA;
  const prevST=ST;
  DATA=ROUNDS[idx].data;
  ST=roundState(idx).ST;
  const answered=ST.filter((_,i)=>isAnswered(i)).length;
  const ok=autoCorrect();
  const essay=essayAnswered();
  const auto=autoTotal();
  const saved=roundState(idx);
  DATA=prevData;
  ST=prevST;
  return {answered,ok,essay,auto,submitted:!!saved.submitted};
}
function getSectionOf(qi){
  for(const s of SECTIONS) if(qi>=s.start&&qi<s.start+s.count) return s;
  return SECTIONS[0];
}
function escapeAttr(value){return String(value).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escapeText(value){return String(value).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function init(){
  renderDashboard();
  const hash=location.hash.match(/^#round-(\d+)$/);
  if(hash){
    const idx=ROUNDS.findIndex(r=>r.id===Number(hash[1]));
    if(idx>=0){startRound(idx);return;}
  }
  showDashboard();
}

function showDashboard(){
  saveState();
  document.getElementById('dashboard-view').style.display='';
  document.getElementById('quiz-shell').style.display='none';
  document.getElementById('score-screen').classList.remove('show');
  document.getElementById('quiz-view').style.display='';
  document.getElementById('page-title').textContent='KOAI 2026 회차별 기출문제';
  document.getElementById('page-subtitle').textContent='AI 이론, 모델 학습, 데이터 분석, 딥러닝 응용을 실전 문제 형식으로 점검합니다.';
  document.title='KOAI 2026 회차별 기출문제';
  history.replaceState(null,'',location.pathname);
  renderDashboard();
  window.scrollTo({top:0,behavior:'smooth'});
}

function startRound(idx, view){
  currentRoundIndex=idx;
  DATA=currentRound().data;
  loadState();
  document.getElementById('dashboard-view').style.display='none';
  document.getElementById('quiz-shell').style.display='';
  document.getElementById('score-screen').classList.remove('show');
  document.getElementById('quiz-view').style.display='';
  updateRoundChrome();
  renderAll();
  if(submitted&&view!=='quiz') showScore();
  history.replaceState(null,'','#round-'+currentRound().id);
  window.scrollTo({top:0,behavior:'smooth'});
}

function updateRoundChrome(){
  document.getElementById('page-title').textContent=currentRound().title;
  document.getElementById('page-subtitle').textContent='객관식 40문항 자동채점 + 서술형 5문항 예시 답안 확인 · 45문항';
  document.getElementById('round-title').textContent=currentRound().label;
  document.title=currentRound().title;
  updateRoundStateText();
}
function updateRoundStateText(){
  const answered=ST.filter((_,i)=>isAnswered(i)).length;
  const ok=autoCorrect();
  document.getElementById('round-state').textContent=submitted?`객관식 ${ok} / ${autoTotal()} 정답 · 서술형 ${essayAnswered()} / ${essayTotal()} 작성`:`응답 ${answered} / ${TOTAL}`;
}

function renderDashboard(){
  const states=ROUNDS.map((_,idx)=>calcProgress(idx));
  document.getElementById('round-grid').innerHTML=ROUNDS.map((r,idx)=>{
    const s=states[idx];
    const pct=s.submitted?Math.round(s.ok/s.auto*100):Math.round(s.answered/TOTAL*100);
    const badge=s.submitted?`객관식 ${s.ok}/${s.auto}`:s.answered>0?'진행 중':'시작 전';
    const action=s.submitted?'결과 보기':s.answered>0?'이어 풀기':'시작';
    const desc=s.submitted?`자동채점 정답률 ${pct}% · 서술형 ${s.essay}/5문항 작성`:`45문제 중 ${s.answered}개 풀이`;
    return `<article class="round-card${s.submitted?' done':''}${idx===currentRoundIndex?' active':''}" role="button" tabindex="0" onclick="startRound(${idx})" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();startRound(${idx})}">
      <div class="round-head"><span class="round-title">${r.label}</span><span class="round-badge">${badge}</span></div>
      <div class="round-desc">${desc}</div>
      <div class="round-progress"><div class="round-bar"><div class="round-fill" style="width:${pct}%"></div></div><div class="round-meta">${pct}%</div></div>
      <div class="round-actions"><span class="round-action primary">${action}</span></div>
    </article>`;
  }).join('');
}

function openRoundMenu(){
  const overlay=document.createElement('div');
  overlay.className='submit-confirm';
  overlay.innerHTML=`<div class="confirm-box">
    <h3>다른 회차 선택</h3>
    <p>현재 풀이 내용은 자동 저장됩니다.</p>
    <div class="confirm-btns" style="flex-wrap:wrap">
      ${ROUNDS.map((r,idx)=>`<button class="${idx===currentRoundIndex?'cf-yes':'cf-no'}" onclick="this.closest('.submit-confirm').remove(); startRound(${idx})">${r.label}</button>`).join('')}
    </div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
}

function renderTabs(){
  const el=document.getElementById('tabs');
  el.innerHTML=SECTIONS.map((s,i)=>{
    const active=getSectionOf(cq)===s;
    return `<button class="tab${active?' active':''}" onclick="jumpToSection(${i})">
      ${s.name}<span class="tab-score" id="tab-sc-${i}"></span>
    </button>`;
  }).join('');
}
function updateTabScores(){
  SECTIONS.forEach((s,i)=>{
    const el=document.getElementById('tab-sc-'+i);
    if(!el) return;
    if(submitted){
      let ok=0;
      let written=0;
      let essayOnly=true;
      for(let j=s.start;j<s.start+s.count;j++){
        if(!isEssay(j)) essayOnly=false;
        if(isCorrect(j)) ok++;
        if(isAnswered(j)) written++;
      }
      el.textContent=essayOnly?`${written}/${s.count}`:`${ok}/${s.count}`;
    } else {
      let answered=0;
      for(let j=s.start;j<s.start+s.count;j++) if(isAnswered(j)) answered++;
      el.textContent=answered>0?`${answered}/${s.count}`:'';
    }
  });
}
function jumpToSection(si){cq=SECTIONS[si].start;saveState();renderAll();}

function renderAll(){
  updateRoundChrome();
  renderTabs();
  updateTabScores();
  renderDots();
  renderQ();
  renderNav();
  renderSubmitArea();
}
function renderDots(){
  const answered=ST.filter((_,i)=>isAnswered(i)).length;
  if(submitted){
    document.getElementById('prog-txt').textContent=`객관식 ${autoCorrect()} / ${autoTotal()} 정답 · 서술형 ${essayAnswered()} / ${essayTotal()} 작성`;
  } else {
    document.getElementById('prog-txt').textContent=`응답 ${answered} / ${TOTAL}`;
  }
  let html='<div class="q-dots">';
  for(let i=0;i<TOTAL;i++){
    let c='dot';
    if(i===cq) c+=' cur';
    if(submitted){
      if(isEssay(i)) c+=' essay';
      else if(isCorrect(i)) c+=' ok';
      else c+=' no';
    } else if(isAnswered(i)) c+=' sel';
    html+=`<div class="${c}" onclick="jumpTo(${i})">${i+1}</div>`;
  }
  html+='</div>';
  document.getElementById('dots-area').innerHTML=html;
}
function renderQ(){
  const q=DATA[cq];
  const s=ST[cq];
  document.getElementById('q-num').textContent=`Q${cq+1}`;
  document.getElementById('q-topic').textContent=q.topic;
  document.getElementById('q-body').innerHTML=q.q;
  const optsEl=document.getElementById('opts');
  if(q.type==='essay'){
    const val=s.sel||'';
    optsEl.innerHTML=`<div class="sa-input-wrap">
      <textarea class="sa-input essay-input${submitted?' locked':''}" id="sa-field" placeholder="서술형 답안을 작성하세요" ${submitted?'readonly':''} oninput="updateSA(this.value)">${escapeText(val)}</textarea>
    </div>`;
  } else if(q.type==='sa'){
    const val=s.sel||'';
    let ic='sa-input';
    if(submitted){ic+=' locked';ic+=isCorrect(cq)?' g-correct':' g-wrong';}
    optsEl.innerHTML=`<div class="sa-input-wrap">
      <input type="text" class="${ic}" id="sa-field" value="${escapeAttr(val)}" placeholder="답을 입력하세요" ${submitted?'readonly':''} oninput="updateSA(this.value)">
      ${submitted?`<div class="sa-correct-ans">정답: ${q.ans[0]}</div>`:''}
    </div>`;
  } else {
    optsEl.innerHTML=q.opts.map((o,i)=>{
      let c='opt';
      if(submitted){
        c+=' locked';
        if(i===q.ans) c+=' g-correct';
        else if(i===s.sel&&s.sel!==q.ans) c+=' g-wrong';
      } else if(s.sel===i) c+=' selected';
      return `<div class="${c}" onclick="selectOpt(${i})">
        <span class="opt-lbl">${LBL[i]}</span>
        <span class="opt-txt">${o}</span>
      </div>`;
    }).join('');
  }
  const gb=document.getElementById('grade-banner');
  const eb=document.getElementById('exp-box');
  if(submitted){
    const correct=isCorrect(cq);
    gb.className='grade-banner show '+(q.type==='essay'?'neutral':(correct?'correct':'wrong'));
    if(q.type==='essay'){
      const wrote=isAnswered(cq);
      gb.innerHTML=wrote
        ?'<span class="grade-icon">!</span><span><strong>서술형 답안 작성 완료.</strong> 아래 채점 포인트와 예시 답안을 기준으로 스스로 점검하세요.</span>'
        :'<span class="grade-icon">!</span><span><strong>서술형 미작성.</strong> 제출은 완료되었으며, 아래 채점 포인트와 예시 답안을 확인할 수 있습니다.</span>';
    } else if(q.type==='sa'){
      gb.innerHTML=correct?'<span class="grade-icon">O</span><span><strong>정답!</strong></span>':'<span class="grade-icon">X</span><span><strong>오답.</strong></span>';
    } else {
      gb.innerHTML=correct?'<span class="grade-icon">O</span><span><strong>정답!</strong> 잘 풀었어요.</span>':'<span class="grade-icon">X</span><span><strong>오답.</strong> 정답은 <strong>'+LBL[q.ans]+'</strong>입니다.</span>';
    }
    document.getElementById('exp-body').innerHTML=q.exp;
    eb.classList.add('show');
  } else {
    gb.className='grade-banner';
    eb.classList.remove('show');
  }
}
function renderNav(){
  document.getElementById('btn-prev').disabled=cq===0;
  const nb=document.getElementById('btn-next');
  nb.textContent='다음';
  nb.onclick=()=>move(1);
  nb.disabled=cq===TOTAL-1;
}
function renderSubmitArea(){
  const btn=document.getElementById('btn-submit');
  const restartBtn=document.getElementById('btn-restart-nav');
  const resultsBtn=document.getElementById('btn-results-side');
  if(submitted){
    btn.style.display='none';
    restartBtn.style.display='';
    resultsBtn.style.display='';
    return;
  }
  btn.style.display='';
  restartBtn.style.display='none';
  resultsBtn.style.display='none';
  const remaining=autoTotal()-autoAnswered();
  if(remaining===0){
    btn.disabled=false;
    btn.classList.add('ready');
    btn.textContent='제출하기';
  } else {
    btn.disabled=true;
    btn.classList.remove('ready');
    btn.textContent=`객관식 ${remaining}문항 미응답`;
  }
}
function selectOpt(i){
  if(submitted) return;
  ST[cq].sel=ST[cq].sel===i?null:i;
  saveState();
  renderAll();
}
function updateSA(val){
  if(submitted) return;
  ST[cq].sel=val;
  saveState();
  renderDots();
  renderSubmitArea();
  updateRoundStateText();
}
function submitAll(){
  const remaining=autoTotal()-autoAnswered();
  if(remaining>0) return;
  const overlay=document.createElement('div');
  overlay.className='submit-confirm';
  overlay.innerHTML=`<div class="confirm-box">
    <h3>답안을 제출하시겠습니까?</h3>
    <p>제출 후에는 답을 변경할 수 없습니다.<br>객관식 40문항은 자동채점되고, 서술형 5문항은 예시 답안이 공개됩니다.</p>
    <div class="confirm-btns">
      <button class="cf-no" onclick="this.closest('.submit-confirm').remove()">취소</button>
      <button class="cf-yes" onclick="confirmSubmit()">제출하기</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
}
function confirmSubmit(){
  document.querySelector('.submit-confirm')?.remove();
  submitted=true;
  saveState();
  renderAll();
  showScore();
}
function move(dir){cq=Math.max(0,Math.min(TOTAL-1,cq+dir));saveState();renderAll();}
function jumpTo(i){cq=i;saveState();renderAll();}
function showScore(){
  document.getElementById('quiz-view').style.display='none';
  const ss=document.getElementById('score-screen');
  ss.classList.add('show');
  const ok=autoCorrect();
  const graded=autoTotal();
  const written=essayAnswered();
  const pct=Math.round(ok/graded*100);
  const grades=[
    {s:95,g:'S',c:'#1c6b3e'},{s:90,g:'A+',c:'#1c6b3e'},{s:80,g:'A',c:'#1c6b3e'},
    {s:70,g:'B+',c:'#1d6b5f'},{s:60,g:'B',c:'#1d6b5f'},
    {s:50,g:'C+',c:'#b7892d'},{s:0,g:'C',c:'#a33d2d'}
  ];
  const {g,c}=grades.find(x=>pct>=x.s);
  const nextIdx=(currentRoundIndex+1)%ROUNDS.length;
  ss.innerHTML=`
  <div class="score-hero">
    <div class="score-grade" style="background:${c}22;color:${c};border:1.5px solid ${c}">${g}</div>
    <div class="score-num" style="color:${c}">${ok} <span style="font-size:1.8rem;color:var(--muted)">/ ${graded}</span></div>
    <div class="score-sub">객관식 정답률 ${pct}% · 서술형 ${written} / ${essayTotal()}문항 작성 · KOAI 2026 ${currentRound().label}</div>
    <div class="score-bar-wrap"><div class="score-bar-fill" style="width:${pct}%;background:${c}"></div></div>
    <div class="section-scores">
      ${SECTIONS.map(sec=>{
        let secOk=0;
        let secWritten=0;
        let essayOnly=true;
        for(let i=sec.start;i<sec.start+sec.count;i++){
          if(!isEssay(i)) essayOnly=false;
          if(isCorrect(i)) secOk++;
          if(isAnswered(i)) secWritten++;
        }
        const secVal=essayOnly?`${secWritten}/${sec.count}`:`${secOk}/${sec.count}`;
        const secCol=essayOnly?'#b7892d':secOk===sec.count?'#1c6b3e':secOk>0?'#1d6b5f':'#a33d2d';
        return `<div class="sec-card"><div class="sec-name">${sec.full}</div><div class="sec-val" style="color:${secCol}">${secVal}</div></div>`;
      }).join('')}
    </div>
  </div>
  <div class="score-actions">
    <button class="btn-restart" onclick="restartAll()">다시 시작</button>
    <button class="btn-review" onclick="reviewMode()">틀린 문제 복습</button>
    <button class="btn-dashboard" onclick="showDashboard()">대시보드</button>
    <button class="btn-next-round" onclick="startRound(${nextIdx})">${ROUNDS[nextIdx].label} 시작</button>
  </div>`;
}
function restartAll(){
  ST=emptyState();
  submitted=false;
  cq=0;
  saveState();
  document.getElementById('score-screen').classList.remove('show');
  document.getElementById('quiz-view').style.display='';
  renderAll();
  window.scrollTo({top:0,behavior:'smooth'});
}
function reviewMode(){
  const wrongIdx=ST.map((_,i)=>isAutoGraded(i)&&!isCorrect(i)?i:-1).filter(i=>i>=0);
  if(wrongIdx.length===0){alert('자동채점 문항을 모두 맞혔습니다!');return;}
  cq=wrongIdx[0];
  document.getElementById('score-screen').classList.remove('show');
  document.getElementById('quiz-view').style.display='';
  renderAll();
  window.scrollTo({top:0,behavior:'smooth'});
}
function nextWrong(){
  const wrongIdx=ST.map((_,i)=>isAutoGraded(i)&&!isCorrect(i)?i:-1).filter(i=>i>=0);
  if(wrongIdx.length===0){alert('자동채점 문항을 모두 맞혔습니다!');return;}
  const next=wrongIdx.find(i=>i>cq);
  cq=next!==undefined?next:wrongIdx[0];
  saveState();
  renderAll();
  window.scrollTo({top:0,behavior:'smooth'});
}

window.onload=init;
</script>
</body>
</html>
