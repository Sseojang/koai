<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOAI 회차별 기출문제</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f1e8;--surf:#fffaf0;--surf2:#f0ebe0;--bord:#d8cfbd;
  --text:#20201d;--muted:#6e6a60;--accent:#1d6b5f;--acc2:#2a8a7a;
  --ok:#1c6b3e;--ok-bg:#d8eadc;
  --no:#a33d2d;--no-bg:#f4d8d2;
  --sel-bg:#d7ece8;--sel-bord:#1d6b5f;
  --hint-bg:#fff1c9;--hint-bord:#b7892d;
  --r:12px;--rs:8px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  background:
    linear-gradient(90deg, rgba(32,32,29,.04) 1px, transparent 1px),
    linear-gradient(rgba(32,32,29,.035) 1px, transparent 1px),
    var(--bg);
  background-size:28px 28px;
  color:var(--text);min-height:100vh;line-height:1.8;font-size:15px}

#app{max-width:820px;margin:0 auto;padding:2rem 1.25rem 6rem}

.hdr{text-align:center;padding:2.5rem 0 2rem;border-bottom:1px solid var(--bord);margin-bottom:2rem}
.hdr-badge{display:inline-flex;align-items:center;gap:.4rem;font-size:.75rem;font-weight:600;
  color:var(--acc2);background:rgba(29,107,95,.12);border:1px solid rgba(29,107,95,.3);
  padding:.3rem .8rem;border-radius:99px;letter-spacing:.05em;margin-bottom:.9rem}
.hdr h1{font-family:'JetBrains Mono',monospace;font-size:1.45rem;font-weight:600;color:var(--text);margin-bottom:.4rem}
.hdr p{font-size:.875rem;color:var(--muted)}

.tabs{display:flex;gap:.4rem;margin-bottom:1.5rem;flex-wrap:wrap}
.tab{flex:1;min-width:70px;padding:.6rem .35rem;background:var(--surf);border:1px solid var(--bord);
  border-radius:var(--rs);font-size:.78rem;font-weight:500;color:var(--muted);cursor:pointer;
  text-align:center;transition:all .18s;font-family:'Noto Sans KR',sans-serif;line-height:1.3}
.tab:hover{border-color:var(--accent);color:var(--acc2)}
.tab.active{background:var(--accent);border-color:var(--accent);color:#fffaf0;font-weight:700}
.tab .tab-score{font-family:'JetBrains Mono',monospace;font-size:.7rem;display:block;margin-top:2px;opacity:.7}

#quiz-view{display:flex;gap:1.25rem;align-items:flex-start}
.main-col{flex:1;min-width:0}
.prog-area{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);
  padding:.5rem .6rem;width:160px;flex-shrink:0;position:sticky;top:1rem}
.prog-top{margin-bottom:.45rem}
.prog-title{font-size:.68rem;color:var(--muted)}
.stat-ok{color:var(--ok)} .stat-no{color:var(--no)} .stat-sel{color:var(--acc2)}
.prog-bar{height:4px;background:var(--surf2);border-radius:99px;overflow:hidden;margin-bottom:.6rem}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--acc2));
  border-radius:99px;transition:width .35s ease}
.sec-label{font-size:.6rem;font-weight:700;color:var(--acc2);margin:5px 0 3px;letter-spacing:.04em}
.q-dots{display:grid;grid-template-columns:repeat(8,1fr);gap:2px}
.dot{width:15px;height:15px;border-radius:50%;border:1px solid var(--bord);background:var(--surf2);
  cursor:pointer;font-size:.45rem;display:flex;align-items:center;justify-content:center;
  color:var(--muted);transition:all .15s;font-family:'JetBrains Mono',monospace;font-weight:600}
.dot:hover{border-color:var(--acc2);color:var(--acc2)}
.dot.cur{border-color:var(--acc2);background:rgba(29,107,95,.15);color:var(--acc2)}
.dot.sel{border-color:var(--accent);background:var(--sel-bg);color:var(--acc2)}
.dot.essay{background:var(--hint-bg);border-color:var(--hint-bord);color:#7b5a19}
.dot.ok{background:var(--ok-bg);border-color:var(--ok);color:var(--ok)}
.dot.no{background:var(--no-bg);border-color:var(--no);color:var(--no)}

.q-card{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);
  padding:1.75rem;margin-bottom:1rem}
.q-meta{display:flex;align-items:center;gap:.6rem;margin-bottom:1.1rem;flex-wrap:wrap}
.q-num{font-family:'JetBrains Mono',monospace;font-size:.8rem;font-weight:700;
  background:var(--accent);color:#fffaf0;padding:.3rem .7rem;border-radius:var(--rs)}
.q-topic{font-size:.78rem;color:var(--acc2);background:rgba(29,107,95,.12);
  padding:.25rem .65rem;border-radius:var(--rs);border:1px solid rgba(29,107,95,.25)}
.q-subj{font-size:.72rem;font-weight:700;padding:.22rem .6rem;border-radius:99px;
  background:rgba(32,32,29,.07);color:var(--muted);border:1px solid var(--bord)}
.diff{font-size:.78rem;padding:.22rem .6rem;border-radius:99px;font-weight:600;letter-spacing:.02em}
.diff-1{background:rgba(28,107,62,.1);color:var(--ok);border:1px solid rgba(28,107,62,.25)}
.diff-2{background:rgba(183,137,45,.1);color:#b7892d;border:1px solid rgba(183,137,45,.25)}
.diff-3{background:rgba(163,61,45,.1);color:var(--no);border:1px solid rgba(163,61,45,.25)}
.q-body{font-size:.95rem;color:var(--text);margin-bottom:1.4rem;line-height:1.85}
.q-body table{border-collapse:collapse;margin:.75rem 0;font-size:.875rem}
.q-body th,.q-body td{border:1px solid var(--bord);padding:.4rem .9rem}
.q-body th{background:var(--surf2);color:var(--acc2);font-weight:600;text-align:center}
.q-body td{font-family:'JetBrains Mono',monospace;font-size:.83rem}
.q-body code{font-family:'JetBrains Mono',monospace;font-size:.875em;background:var(--surf2);
  padding:.15em .4em;border-radius:4px;color:var(--acc2)}
.q-body pre{background:#1e1e1e;border:1px solid #333;border-radius:var(--rs);
  padding:.9rem 1.1rem;font-family:'JetBrains Mono',monospace;font-size:.83rem;
  color:#d4d4d4;overflow-x:auto;margin:.65rem 0;line-height:1.6}
.q-body pre .kw{color:#569cd6} .q-body pre .fn{color:#dcdcaa}
.q-body pre .str{color:#ce9178} .q-body pre .cm{color:#6a9955}
.q-body pre .num{color:#b5cea8}
.q-body strong{color:var(--text);font-weight:700}
.q-body .q-ask{display:none}
.q-body .math{font-family:'JetBrains Mono',monospace;background:var(--surf2);padding:.2em .5em;border-radius:4px;font-size:.9em}


.opts{display:flex;flex-direction:column;gap:.55rem}
.opt{display:flex;align-items:flex-start;gap:.85rem;padding:.9rem 1.1rem;
  background:var(--surf2);border:1.5px solid var(--bord);border-radius:var(--rs);
  cursor:pointer;transition:all .17s;font-size:.92rem;user-select:none}
.opt:hover:not(.locked){border-color:var(--accent);background:var(--sel-bg)}
.opt.selected{border-color:var(--sel-bord);background:var(--sel-bg)}
.opt.selected .opt-lbl{color:var(--acc2)}
.opt.locked{cursor:default}
.opt.g-correct{border-color:var(--ok)!important;background:var(--ok-bg)!important}
.opt.g-correct .opt-lbl{color:var(--ok)!important}
.opt.g-wrong{border-color:var(--no)!important;background:var(--no-bg)!important}
.opt.g-wrong .opt-lbl{color:var(--no)!important}
.opt-lbl{font-weight:700;font-size:.88rem;min-width:22px;color:var(--muted);flex-shrink:0;padding-top:.05rem}
.opt-txt{line-height:1.7}
.opt-txt code{font-family:'JetBrains Mono',monospace;font-size:.85em;background:rgba(0,0,0,.06);padding:.1em .35em;border-radius:3px}

.sa-input-wrap{margin-top:.5rem}
.sa-input{width:100%;padding:.75rem 1rem;border:1.5px solid var(--bord);border-radius:var(--rs);
  font-size:.9rem;font-family:'Noto Sans KR',sans-serif;background:var(--surf2);
  color:var(--text);outline:none;transition:border-color .2s;box-sizing:border-box}
.sa-input:focus{border-color:var(--accent)}
.sa-input.locked{color:var(--muted);cursor:default}
.sa-input.g-correct{border-color:var(--ok);background:var(--ok-bg);color:var(--ok)}
.sa-input.g-wrong{border-color:var(--no);background:var(--no-bg);color:var(--no)}
.sa-correct-ans{margin-top:.5rem;font-size:.85rem;font-weight:600;color:var(--ok)}
.essay-input{min-height:210px;resize:vertical;line-height:1.75}

.grade-banner{display:none;margin-top:1rem;padding:.9rem 1.1rem;border-radius:var(--rs);
  font-size:.875rem;font-weight:500;animation:slideUp .2s ease}
.grade-banner.show{display:flex;align-items:flex-start;gap:.6rem}
.grade-banner.correct{background:var(--ok-bg);border:1px solid rgba(28,107,62,.35);color:var(--ok)}
.grade-banner.wrong{background:var(--no-bg);border:1px solid rgba(163,61,45,.35);color:var(--no)}
.grade-banner.neutral{background:var(--hint-bg);border:1px solid rgba(183,137,45,.35);color:#7b5a19}
.grade-icon{font-size:1.1rem;flex-shrink:0;margin-top:.05rem}

.exp-box{display:none;margin-top:.75rem;padding:1rem 1.1rem;background:var(--surf2);
  border:1px solid var(--bord);border-left:3px solid var(--acc2);border-radius:var(--rs);
  font-size:.875rem;color:var(--text);line-height:1.85;animation:fadeIn .2s ease}
.exp-box.show{display:block}
.exp-head{font-size:.72rem;font-weight:700;color:var(--acc2);text-transform:uppercase;
  letter-spacing:.07em;margin-bottom:.5rem}

@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

.nav{display:flex;gap:.65rem;margin-top:1.1rem;align-items:center}
.btn{padding:.75rem 1.25rem;border-radius:var(--rs);font-size:.875rem;font-weight:600;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .17s;
  border:1.5px solid var(--bord);white-space:nowrap}
.btn:disabled{opacity:.28;cursor:default}
.btn-ghost{background:transparent;color:var(--muted);flex-shrink:0}
.btn-ghost:hover:not(:disabled){border-color:var(--acc2);color:var(--acc2)}
.btn-grade{flex:1;background:var(--accent);border-color:var(--accent);color:#fffaf0}
.btn-grade:hover:not(:disabled){opacity:.88}
.btn-grade:disabled{background:var(--surf2);border-color:var(--bord);color:var(--muted)}
.btn-next{background:transparent;color:var(--muted);flex-shrink:0}
.btn-next:hover:not(:disabled){border-color:var(--acc2);color:var(--acc2)}

.score-screen{display:none;animation:fadeIn .3s ease}
.score-screen.show{display:block}
.score-hero{text-align:center;padding:2.5rem 1rem;background:var(--surf);
  border:1px solid var(--bord);border-radius:var(--r);margin-bottom:1.5rem}
.score-grade{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:2.5rem;
  font-weight:700;padding:.5rem 2rem;border-radius:var(--r);margin-bottom:.75rem}
.score-num{font-family:'JetBrains Mono',monospace;font-size:3.5rem;font-weight:700;
  line-height:1;margin:.5rem 0}
.score-sub{font-size:.9rem;color:var(--muted);margin-top:.3rem}
.score-bar-wrap{background:var(--surf2);border-radius:99px;height:8px;margin:1.25rem 0 .4rem;overflow:hidden}
.score-bar-fill{height:100%;border-radius:99px;transition:width .6s ease}
.section-scores{display:grid;grid-template-columns:repeat(4,1fr);gap:.6rem;margin:1.25rem 0}
.sec-card{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--rs);padding:.9rem 1rem}
.sec-card .sec-name{font-size:.73rem;color:var(--muted);margin-bottom:.35rem;line-height:1.3}
.sec-card .sec-val{font-family:'JetBrains Mono',monospace;font-size:1.3rem;font-weight:700}
.score-actions{display:flex;gap:.75rem;justify-content:center;margin-top:1.25rem}
.btn-restart{padding:.75rem 2rem;background:var(--accent);border:none;border-radius:var(--rs);
  color:#fffaf0;font-size:.9rem;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.btn-restart:hover{opacity:.88}
.btn-review{padding:.75rem 2rem;background:var(--surf2);border:1px solid var(--bord);
  border-radius:var(--rs);color:var(--text);font-size:.9rem;font-weight:600;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif}
.btn-review:hover{border-color:var(--acc2);color:var(--acc2)}

.btn-restart-nav{flex:1;padding:.75rem 1.25rem;background:var(--accent);border:none;
  border-radius:var(--rs);color:#fffaf0;font-size:.875rem;font-weight:600;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .17s;white-space:nowrap}
.btn-restart-nav:hover{opacity:.88}
.btn-results-side{width:100%;margin-top:.5rem;padding:.45rem;background:var(--surf2);
  border:1px solid var(--bord);border-radius:var(--rs);color:var(--text);font-size:.7rem;
  font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .17s}
.btn-results-side:hover{border-color:var(--acc2);color:var(--acc2)}

.btn-submit{flex:1;padding:.75rem 1.25rem;background:var(--surf2);border:1.5px solid var(--bord);
  border-radius:var(--rs);color:var(--muted);font-size:.875rem;font-weight:600;
  font-family:'Noto Sans KR',sans-serif;cursor:not-allowed;transition:all .25s;white-space:nowrap}
.btn-submit.ready{background:linear-gradient(135deg,#1d6b5f,#2a8a7a);border-color:transparent;
  color:#fffaf0;cursor:pointer;box-shadow:0 2px 10px rgba(29,107,95,.3)}
.btn-submit.ready:hover{opacity:.9}

.submit-confirm{position:fixed;inset:0;background:rgba(32,32,29,.5);display:flex;
  align-items:center;justify-content:center;z-index:100;animation:fadeIn .2s ease}
.confirm-box{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);
  padding:2rem;max-width:400px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.confirm-box h3{font-size:1.1rem;margin-bottom:.5rem}
.confirm-box p{font-size:.875rem;color:var(--muted);margin-bottom:1.5rem}
.confirm-btns{display:flex;gap:.75rem;justify-content:center}
.confirm-btns button{padding:.7rem 1.8rem;border-radius:var(--rs);font-size:.875rem;font-weight:600;
  cursor:pointer;font-family:'Noto Sans KR',sans-serif;border:1.5px solid var(--bord);transition:all .17s}
.confirm-btns .cf-yes{background:var(--accent);border-color:var(--accent);color:#fffaf0}
.confirm-btns .cf-yes:hover{opacity:.88}
.confirm-btns .cf-no{background:var(--surf2);color:var(--text)}
.confirm-btns .cf-no:hover{border-color:var(--acc2);color:var(--acc2)}


@media(max-width:768px){
  #quiz-view{flex-direction:column}
  .prog-area{width:100%;position:static;padding:.85rem 1rem}
  .prog-top{flex-direction:row;justify-content:space-between;align-items:center}
}
@media(max-width:540px){
  .hdr h1{font-size:1.1rem}
  .q-card{padding:1.25rem}
  .section-scores{grid-template-columns:1fr 1fr 1fr}
  .tab{font-size:.7rem;padding:.5rem .25rem;min-width:50px}
  .score-num{font-size:2.5rem}
  .dot{width:17px;height:17px;font-size:.5rem}
}
/* dashboard */
.view{animation:fadeIn .25s ease}
.dashboard-intro{max-width:760px;margin:0 auto 1.2rem;color:var(--muted);font-size:.92rem;line-height:1.85;text-align:center}
.dashboard-intro strong{color:var(--text)}
.round-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.75rem;margin-top:1rem}
.round-card{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:1rem;text-align:left;cursor:pointer;transition:all .18s;font-family:'Noto Sans KR',sans-serif;color:var(--text)}
.round-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 10px 25px rgba(32,32,29,.08)}
.round-card:focus{outline:2px solid rgba(29,107,95,.35);outline-offset:2px}
.round-card.done{border-color:rgba(28,107,62,.35)}
.round-card.active{border-color:var(--accent);background:var(--sel-bg)}
.round-head{display:flex;align-items:center;justify-content:space-between;gap:.75rem;margin-bottom:.65rem}
.round-title{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:1rem;color:var(--text)}
.round-badge{font-size:.7rem;font-weight:700;border:1px solid var(--bord);border-radius:99px;padding:.15rem .55rem;color:var(--muted);background:var(--surf2);white-space:nowrap}
.round-card.done .round-badge{color:var(--ok);border-color:rgba(28,107,62,.35);background:var(--ok-bg)}
.round-card.active .round-badge{color:#fffaf0;background:var(--accent);border-color:var(--accent)}
.round-desc{font-size:.8rem;color:var(--muted);margin-bottom:.8rem;line-height:1.6}
.round-progress{display:flex;align-items:center;gap:.6rem}
.round-bar{height:6px;flex:1;background:var(--surf2);border-radius:99px;overflow:hidden;border:1px solid rgba(216,207,189,.6)}
.round-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--acc2));border-radius:99px;transition:width .3s ease}
.round-meta{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--muted);min-width:54px;text-align:right}
.round-actions{display:flex;gap:.5rem;margin-top:.85rem}
.round-action{border:1px solid var(--bord);background:var(--surf2);color:var(--text);border-radius:var(--rs);font-size:.78rem;font-weight:700;padding:.45rem .7rem;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .17s}
.round-action.primary{background:var(--accent);border-color:var(--accent);color:#fffaf0}
.round-action:hover{border-color:var(--acc2);color:var(--acc2)}
.round-action.primary:hover{color:#fffaf0;opacity:.9}
.quiz-toolbar{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:1rem;background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:.8rem 1rem}
.quiz-title{font-size:.86rem;color:var(--muted)}
.quiz-title strong{font-family:'JetBrains Mono',monospace;color:var(--text);font-size:.95rem}
.toolbar-actions{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.btn-small{border:1px solid var(--bord);background:var(--surf2);color:var(--text);border-radius:var(--rs);font-size:.78rem;font-weight:700;padding:.5rem .75rem;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .17s;white-space:nowrap}
.btn-small:hover{border-color:var(--acc2);color:var(--acc2)}
.btn-small.primary{background:var(--accent);border-color:var(--accent);color:#fffaf0}
.btn-small.primary:hover{opacity:.9;color:#fffaf0}
.score-actions{flex-wrap:wrap}
.btn-dashboard{padding:.75rem 2rem;background:var(--surf2);border:1px solid var(--bord);border-radius:var(--rs);color:var(--text);font-size:.9rem;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.btn-dashboard:hover{border-color:var(--acc2);color:var(--acc2)}
.btn-next-round{padding:.75rem 2rem;background:var(--accent);border:1px solid var(--accent);border-radius:var(--rs);color:#fffaf0;font-size:.9rem;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.btn-next-round:hover{opacity:.88}
.empty-note{background:var(--surf);border:1px dashed var(--bord);border-radius:var(--r);padding:1rem;color:var(--muted);font-size:.85rem;text-align:center}

@media(max-width:768px){
  .quiz-toolbar{align-items:flex-start;flex-direction:column}
  .toolbar-actions{justify-content:flex-start}
}
@media(max-width:540px){
  .round-grid{grid-template-columns:1fr}
  .round-head{align-items:flex-start;flex-direction:column;gap:.35rem}
  .round-actions{flex-direction:column}
  .round-action{width:100%}
  .score-actions{flex-direction:column}
  .score-actions button{width:100%}
}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-badge" id="hdr-badge">KOAI 2026 PRACTICE</div>
    <h1 id="page-title" >KOAI 2026 회차별 기출문제</h1>
    <p id="page-subtitle">프로그래밍 · 머신러닝 · 데이터 · 사이언스 · 신경망 · 딥러닝</p>
  </div>

  <section id="dashboard-view" class="view">
    <p class="dashboard-intro"><strong>* 각 회차는 객관식 40문항과 서술형 5문항으로 구성되어 있습니다.</strong></p>
    <div class="round-grid" id="round-grid"></div>
  </section>

  <section id="quiz-shell" class="view" style="display:none">
    <div class="quiz-toolbar">
      <div class="quiz-title"><strong id="round-title">제1회</strong><br><span id="round-state">응답 0 / 45</span></div>
      <div class="toolbar-actions">

"초기화 방법과 관계없이 결과가 항상 동일하다"],ans:1,
exp:"<strong>K-means++</strong>: 첫 중심점을 무작위로 선택한 뒤, 이후 중심점은 기존 중심점과의 거리에 비례한 확률로 선택<br>→ 초기 중심점이 골고루 분포되어 수렴 속도 ↑, 품질 ↑<br>scikit-learn의 <code>KMeans</code>는 기본값이 <code>init='k-means++'</code>입니다."},

{topic:"PCA — 주성분",d:2,
q:`<p>PCA(주성분 분석)에서 <strong>첫 번째 주성분(PC1)</strong>이 의미하는 것으로 옳은 것은?</p>
<p class="q-ask">PC1의 의미는?</p>`,
hint:"PCA는 데이터의 분산을 최대한 보존하는 방향을 찾습니다.",
opts:["데이터의 평균 방향이다",
"데이터의 분산을 최대로 설명하는 방향이다",
"데이터의 분산을 최소화하는 방향이다",
"가장 많은 데이터 포인트가 위치하는 클러스터의 중심이다"],ans:1,
exp:"PCA의 <strong>첫 번째 주성분(PC1)</strong>은 데이터의 <strong>분산을 최대로 설명하는 방향</strong>입니다.<br>• 수학적으로: 공분산 행렬의 가장 큰 고유값에 대응하는 고유벡터<br>• PC2는 PC1에 직교하면서 남은 분산을 최대로 설명하는 방향<br>• 이런 식으로 분산 기여도가 큰 순서로 주성분이 정해집니다."},

{topic:"t-SNE",d:2,
q:`<p>t-SNE에 관한 설명으로 옳지 않은 것은?</p>
<p class="q-ask">옳지 않은 설명은?</p>`,
hint:"t-SNE는 국소 구조 보존에 강하지만, 임베딩 결과의 축 값이나 군집 간 거리에는 주의가 필요합니다.",
opts:["perplexity는 이웃의 유효 수를 조절하는 하이퍼파라미터이다",
"임베딩 결과의 축 값과 군집 간 거리에 절대적 의미가 있다",
"확률적 알고리즘이므로 실행할 때마다 결과가 달라질 수 있다",
"주로 고차원 데이터의 2D/3D 시각화에 사용된다"],ans:1,
exp:"t-SNE의 주요 특성:<br>• perplexity: 이웃의 유효 수 조절 ✓<br>• 확률적 → 매번 다른 결과 가능 ✓<br>• 2D/3D 시각화 목적 ✓<br>• <strong>임베딩의 절대 좌표와 군집 간 거리에는 의미가 없음</strong> ✗<br>→ 군집의 존재 여부와 상대적 밀집도만 해석 가능"},

{topic:"DBSCAN",d:2,
q:`<p>DBSCAN이 K-means보다 유리한 상황으로 옳은 것은?</p>
<p class="q-ask">DBSCAN이 더 적합한 경우는?</p>`,
hint:"DBSCAN은 밀도 기반 알고리즘으로, 군집 수를 미리 지정할 필요가 없습니다.",
opts:["구형(spherical)이고 크기가 비슷한 군집",
"군집 수를 미리 정확히 알고 있는 경우",
"비볼록(non-convex) 형태의 군집과 노이즈가 있는 경우",
"모든 데이터가 반드시 하나의 군집에 속해야 하는 경우"],ans:2,
exp:"DBSCAN의 장점:<br>• <strong>비볼록 형태</strong>(초승달, 고리 등)의 군집 탐지 가능<br>• <strong>노이즈 포인트</strong>를 자동으로 식별<br>• 군집 수 K를 사전에 지정하지 않음<br>반면 K-means는 구형 군집에 적합하고, 모든 데이터를 군집에 할당합니다."},

{topic:"스펙트럼 군집화",d:3,
q:`<p>스펙트럼 군집화(Spectral Clustering)에 대한 설명으로 옳은 것은?</p>
<p class="q-ask">옳은 설명은?</p>`,
hint:"스펙트럼 군집화는 그래프 이론을 기반으로 하며, 라플라시안 행렬의 고유벡터를 활용합니다.",
opts:["데이터의 유사도 그래프에서 라플라시안 행렬의 고유벡터를 이용하여 군집화한다",
"K-means와 완전히 동일한 알고리즘이다",
"반드시 구형 군집만 찾을 수 있다",
"유사도 행렬을 사용하지 않는다"],ans:0,
exp:"<strong>스펙트럼 군집화</strong> 순서:<br>① 데이터 간 유사도 행렬(affinity matrix) 구성<br>② 그래프 라플라시안 행렬 계산<br>③ 라플라시안의 <strong>고유벡터</strong>를 추출하여 새로운 특성 공간 생성<br>④ 이 공간에서 K-means 등으로 군집화<br>→ 비볼록 형태의 군집도 잘 찾을 수 있습니다."},

{topic:"혼동행렬 — F1 계산",d:2,
q:`<p>이진 분류 모델의 혼동행렬이 아래와 같습니다.</p>
<table>
<tr><th></th><th>예측 양성</th><th>예측 음성</th></tr>
<tr><td><strong>실제 양성</strong></td><td>60</td><td>40</td></tr>
<tr><td><strong>실제 음성</strong></td><td>20</td><td>80</td></tr>
</table>
<p class="q-ask">F1 점수에 가장 가까운 값은?</p>`,
hint:"Precision = TP/(TP+FP), Recall = TP/(TP+FN), F1 = 2·P·R/(P+R)를 순서대로 계산하세요.",
opts:["0.50","0.60","0.67","0.75"],ans:2,
exp:"TP=60, FP=20, FN=40, TN=80<br>Precision = 60/(60+20) = 60/80 = <strong>0.75</strong><br>Recall = 60/(60+40) = 60/100 = <strong>0.60</strong><br>F1 = 2 × 0.75 × 0.60 / (0.75 + 0.60) = 0.90 / 1.35 ≈ <strong>0.67</strong>"},

{topic:"과대적합 vs 과소적합",d:1,
q:`<p>다음 중 <strong>과대적합(overfitting)</strong>의 전형적인 신호로 가장 옳은 것은?</p>
<p class="q-ask">과대적합의 신호는?</p>`,
hint:"과대적합은 모델이 학습 데이터에 너무 맞추어져 새로운 데이터에 일반화하지 못하는 상태입니다.",
opts:["학습 손실과 검증 손실이 모두 높다",
"학습 손실은 낮지만 검증 손실이 학습 손실보다 훨씬 높다",
"학습 손실이 검증 손실보다 높다",
"손실 곡선이 진동 없이 평탄하게 유지된다"],ans:1,
exp:"<strong>과대적합</strong>: 모델이 학습 데이터의 노이즈까지 학습<br>• 학습 손실: 매우 낮음 ✓<br>• 검증 손실: 학습 손실보다 훨씬 높음 ✓<br>→ 학습-검증 손실의 <strong>큰 격차(gap)</strong>가 핵심 신호<br>①은 과소적합, ③은 일반적이지 않은 상황입니다."},

{topic:"하이퍼파라미터 튜닝",d:2,
q:`<p>다음 중 하이퍼파라미터 탐색 전략에 대한 설명으로 옳지 않은 것은?</p>
<p class="q-ask">옳지 않은 설명은?</p>`,
hint:"그리드 서치, 랜덤 서치, 베이지안 최적화 각각의 특성을 비교해보세요.",
opts:["그리드 서치(Grid Search)는 차원이 늘수록 비용이 기하급수적으로 증가한다",
"랜덤 서치(Random Search)는 그리드 서치보다 적은 시도로도 좋은 영역을 찾는 경향이 있다",
"베이지안 최적화는 이전 시도 결과를 활용해 다음 탐색 지점을 선택한다",
"테스트 셋에서 직접 하이퍼파라미터를 튜닝하는 것이 가장 정확한 방법이다"],ans:3,
exp:"<strong>테스트 셋은 최종 평가에만 사용해야</strong> 합니다. 테스트 셋으로 튜닝하면 테스트 셋에 과적합됩니다.<br>• 그리드 서치: 모든 조합 탐색 → O(n<sup>d</sup>) 비용 ✓<br>• 랜덤 서치: 무작위 탐색 → 효율적 ✓<br>• 베이지안 최적화: 대리 모델로 유망한 지점 선택 ✓"},

{topic:"교차검증 — LOOCV",d:2,
q:`<p>k-fold 교차검증에서 k=N(전체 데이터 수, <strong>LOOCV</strong>)일 때의 특성으로 옳은 것은?</p>
<p class="q-ask">LOOCV의 특성은?</p>`,
hint:"LOOCV는 매번 1개만 남기고 N-1개로 학습합니다. 학습 데이터가 거의 전체이므로 편향은 작지만...",
opts:["편향이 크고 분산이 작다",
"편향은 작지만 분산이 크고, 계산 비용이 높다",
"항상 가장 정확한 일반화 추정을 제공한다",
"k=5일 때와 결과가 항상 동일하다"],ans:1,
exp:"<strong>LOOCV (k=N)</strong>:<br>• 학습 데이터 = N-1개 (거의 전체) → <strong>편향 작음</strong><br>• 각 폴드의 학습 데이터가 거의 동일 → 모델 간 상관 높음 → <strong>분산 큼</strong><br>• N번 학습 필요 → <strong>계산 비용 높음</strong><br>일반적으로 k=5 또는 k=10이 편향-분산 트레이드오프에서 좋은 균형점입니다."},

{topic:"ROC 곡선",d:1,
q:`<p>ROC 곡선의 x축과 y축에 해당하는 지표로 옳은 것은?</p>
<p class="q-ask">ROC 곡선의 축 구성은?</p>`,
hint:"ROC는 Receiver Operating Characteristic의 약자입니다. 양성/음성 예측의 트레이드오프를 보여줍니다.",
opts:["x축: 정밀도(Precision), y축: 재현율(Recall)",
"x축: 위양성률(FPR), y축: 진양성률(TPR)",
"x축: 재현율(Recall), y축: 정밀도(Precision)",
"x축: 정확도(Accuracy), y축: F1 점수"],ans:1,
exp:"<strong>ROC 곡선</strong>:<br>• x축: <strong>FPR</strong> (False Positive Rate) = FP/(FP+TN)<br>• y축: <strong>TPR</strong> (True Positive Rate = Recall) = TP/(TP+FN)<br>• ①③은 Precision-Recall 곡선의 축 구성입니다.<br>• AUC = ROC 곡선 아래 면적, 0.5 = 무작위, 1.0 = 완벽"},

{topic:"원-핫 인코딩",d:1,
q:`<p>원-핫 인코딩(one-hot encoding)에 대한 설명으로 옳지 않은 것은?</p>
<p class="q-ask">옳지 않은 설명은?</p>`,
hint:"원-핫 인코딩은 범주를 0/1 이진 벡터로 변환합니다. 범주 간 순서가 있을까요?",
opts:["범주형 변수를 이진 벡터로 변환한다",
"범주 수만큼의 새로운 열이 생성된다",
"범주 간 순서(크기) 정보가 보존된다",
"고유 범주 수가 매우 많으면 차원이 크게 증가한다"],ans:2,
exp:"원-핫 인코딩은 범주를 독립적인 0/1 벡터로 변환합니다.<br>• 서울=[1,0,0,0], 부산=[0,1,0,0] 등<br>• 벡터 간 거리가 모두 동일 → <strong>순서 정보 없음</strong><br>• 범주 수가 많으면 매우 고차원(sparse) → 차원의 저주<br>순서가 있는 범주에는 ordinal encoding이 적합합니다."},

{topic:"표준화 vs 정규화",d:1,
q:`<p>표준화(Standardization)와 Min-Max 정규화(Normalization)의 비교로 옳은 것은?</p>
<p class="q-ask">올바른 비교는?</p>`,
hint:"표준화는 평균과 표준편차를, 정규화는 최솟값과 최댓값을 사용합니다.",
opts:["표준화는 평균 0, 표준편차 1로 변환하고, Min-Max 정규화는 [0, 1] 범위로 변환한다",
"Min-Max 정규화는 이상치(outlier)에 더 강건하다",
"표준화와 Min-Max 정규화는 수학적으로 동일하다",
"Min-Max 정규화는 음수 값을 가진 특성에 적용할 수 없다"],ans:0,
exp:"<strong>표준화</strong>: z = (x − μ) / σ → 평균 0, 표준편차 1<br><strong>Min-Max 정규화</strong>: x' = (x − min) / (max − min) → [0, 1] 범위<br>• Min-Max는 이상치에 <strong>민감</strong> (max/min이 크게 변함)<br>• 표준화가 이상치에 상대적으로 강건함<br>• 음수 값도 정규화 가능 (예: -5 → 0에 가까운 값)"},

{topic:"퍼셉트론",d:1,
q:`<p>단일 퍼셉트론(선형 분류기)으로 학습할 수 <strong>없는</strong> 논리 게이트는?</p>
<p class="q-ask">학습 불가능한 것은?</p>`,
hint:"단일 퍼셉트론은 선형 결정 경계만 만들 수 있습니다. 데이터가 선형 분리 가능한지 생각해보세요.",
opts:["AND","OR","NOT","XOR"],ans:3,

{topic:"SGD vs 배치 경사하강법",d:2,
q:`<p>확률적 경사하강법(SGD)이 전체 배치(batch) 경사하강법에 비해 갖는 특성으로 옳은 것은?</p>
<p class="q-ask">SGD의 특성은?</p>`,
hint:"SGD는 데이터 한 개(또는 미니배치)로 그래디언트를 추정합니다. 이때 발생하는 노이즈의 영향을 생각해보세요.",
opts:["항상 더 정확한 그래디언트를 계산한다",
"노이즈가 있지만 업데이트가 빈번하여 빠르게 수렴할 수 있고, 지역 최솟값 탈출에도 도움이 된다",
"메모리 사용량이 항상 더 크다",
"지역 최솟값에 빠지는 것을 완벽히 방지한다"],ans:1,
exp:"<strong>SGD</strong>의 특성:<br>• 1개(또는 소수) 샘플로 그래디언트 추정 → <strong>노이즈 있음</strong><br>• 업데이트가 빈번 → <strong>빠른 수렴</strong> 가능<br>• 노이즈가 지역 최솟값 <strong>탈출에 도움</strong> (완벽 보장은 아님)<br>• 메모리 효율적 (전체 데이터 안 올려도 됨)"},

{topic:"역전파 — 그래디언트 소실",d:2,
q:`<p>심층 신경망에서 <strong>그래디언트 소실(vanishing gradient)</strong> 문제가 가장 심한 활성화 함수는?</p>
<p class="q-ask">그래디언트 소실이 가장 심한 것은?</p>`,
hint:"각 활성화 함수의 미분값 범위를 생각해보세요. 미분값이 항상 1보다 작은 함수는?",
opts:["ReLU","Leaky ReLU","Sigmoid","ELU"],ans:2,
exp:"<strong>Sigmoid</strong>: σ'(x) = σ(x)(1−σ(x)), 최대값 0.25<br>→ 층이 깊어지면 0.25<sup>n</sup>으로 그래디언트가 <strong>기하급수적으로 감소</strong><br>• ReLU: 양의 영역에서 미분=1 → 소실 없음<br>• Leaky ReLU: 음의 영역에서도 작은 기울기 유지<br>• ELU: 음의 영역에서 부드러운 기울기 제공"},

{topic:"활성화 함수 — ReLU",d:2,
q:`<p>ReLU 함수 f(x) = max(0, x)에 대한 설명으로 옳지 않은 것은?</p>
<p class="q-ask">옳지 않은 설명은?</p>`,
hint:"ReLU의 수학적 정의와 x=0에서의 미분 가능성을 생각해보세요.",
opts:["양의 입력에 대해 그래디언트가 1이므로 그래디언트 소실이 완화된다",
"음의 입력에서 출력이 0이며, 'Dying ReLU' 문제가 발생할 수 있다",
"출력 범위는 [0, ∞)이다",
"x = 0에서 미분값이 항상 정확히 1이다"],ans:3,
exp:"ReLU는 x=0에서 <strong>미분 불가능</strong>(좌미분=0, 우미분=1)<br>실제 구현에서는 관례적으로 0으로 설정합니다.<br>• x > 0: f'(x) = 1 ✓ (그래디언트 소실 완화)<br>• x < 0: f'(x) = 0 → 학습 안 됨 → <strong>Dying ReLU</strong><br>• 출력 범위: [0, ∞) ✓"},

{topic:"손실 함수 — MSE vs MAE",d:2,
q:`<p>회귀 문제에서 MSE(Mean Squared Error) 대비 MAE(Mean Absolute Error)의 특성으로 옳은 것은?</p>
<p class="q-ask">MAE의 특성은?</p>`,
hint:"제곱은 큰 오차를 더 크게 반영하고, 절대값은 모든 오차를 동등하게 취급합니다.",
opts:["MAE는 이상치에 더 민감하다",
"MAE는 이상치에 더 강건(robust)하다",
"MAE의 그래디언트 크기는 오차에 비례하여 변한다",
"MSE와 MAE는 최적해가 항상 동일하다"],ans:1,
exp:"<strong>MSE</strong> = Σ(y−ŷ)² / n → 큰 오차에 제곱으로 가중 → <strong>이상치에 민감</strong><br><strong>MAE</strong> = Σ|y−ŷ| / n → 모든 오차 동등 취급 → <strong>이상치에 강건</strong><br>• MAE의 그래디언트는 ±1 (일정, 오차 크기와 무관)<br>• 이상치가 있으면 MSE와 MAE의 최적해가 달라질 수 있음"},

{topic:"Cross Entropy 계산",d:2,
q:`<p>3-클래스 분류에서 실제 레이블이 <code>[0, 1, 0]</code>(클래스 2)이고 모델의 softmax 출력이 <code>[0.1, 0.7, 0.2]</code>일 때, 교차 엔트로피 손실값에 가장 가까운 것은?</p>
<p class="q-ask">CE 손실값은?</p>`,
hint:"Cross Entropy = −Σ y_i · log(ŷ_i). 원-핫 레이블에서 정답 클래스의 확률에만 −log를 취합니다.",
opts:["0.10","0.36","0.70","1.00"],ans:1,
exp:"원-핫 레이블 [0, 1, 0]에서 정답 클래스(인덱스 1)의 예측 확률 = 0.7<br>CE = −log(0.7) ≈ −(−0.357) = <strong>0.357 ≈ 0.36</strong><br>• 예측이 정답에 가까울수록(확률 → 1) CE → 0<br>• 예측이 틀릴수록(확률 → 0) CE → ∞"},

{topic:"MLP — 비선형성",d:1,
q:`<p>MLP(다층 퍼셉트론)에서 <strong>비선형 활성화 함수</strong>를 사용하지 않으면 발생하는 현상으로 가장 옳은 것은?</p>
<p class="q-ask">활성화 함수 없이 여러 층을 쌓으면?</p>`,
hint:"행렬 곱의 결합법칙을 생각해보세요. W₂(W₁x) = (W₂W₁)x = W'x",
opts:["깊이를 아무리 깊게 해도 단일 선형 변환과 동등해진다",
"항상 더 좋은 성능을 낸다",
"그래디언트 소실 문제가 사라진다",
"자동으로 합성곱 신경망과 동등해진다"],ans:0,
exp:"비선형 활성화 없이 층을 쌓으면:<br>y = W₃(W₂(W₁x)) = (W₃W₂W₁)x = <strong>W'x</strong><br>→ 행렬 곱의 결합법칙에 의해 <strong>단일 선형 변환</strong>과 동일<br>비선형 함수(ReLU 등)를 넣어야만 깊은 층의 표현력이 증가합니다."},

{topic:"임베딩 — 파라미터 수",d:2,
q:`<p>어휘 크기가 10,000이고 임베딩 차원이 256일 때, <code>nn.Embedding(10000, 256)</code> 레이어의 학습 가능한 파라미터 수는?</p>
<p class="q-ask">파라미터 수는?</p>`,
hint:"Embedding 레이어는 내부적으로 (어휘 크기 × 임베딩 차원) 크기의 룩업 테이블(행렬)을 저장합니다.",
opts:["10,000","256","2,560,000","10,256"],ans:2,
exp:"<code>nn.Embedding(V, D)</code>의 파라미터는 <strong>V × D</strong> 크기의 가중치 행렬입니다.<br>10,000 × 256 = <strong>2,560,000</strong><br>각 토큰 ID를 인덱스로 사용하여 해당 행 벡터를 반환합니다.<br>bias는 없으므로 파라미터 수 = V × D"},

{topic:"Scaled Dot-Product Attention",d:2,
q:`<p>Scaled Dot-Product Attention <code class="math">softmax(QK<sup>T</sup> / √d<sub>k</sub>)V</code>에서 <code>√d<sub>k</sub></code>로 나누는 이유로 가장 옳은 것은?</p>
<p class="q-ask">스케일링의 이유는?</p>`,
hint:"d_k(Key의 차원)가 클 때 QK^T의 값이 어떻게 변하는지, softmax 입력이 매우 클 때 어떤 문제가 생기는지 생각해보세요.",
opts:["출력의 차원을 줄이기 위해서이다",
"d<sub>k</sub>가 클 때 내적값이 커져 softmax가 포화되는 것을 방지하기 위해서이다",
"그래디언트를 항상 1로 유지하기 위해서이다",
"행렬 곱이 정의되도록 차원을 맞추기 위해서이다"],ans:1,
exp:"d<sub>k</sub>가 크면 Q와 K의 내적값의 분산이 d<sub>k</sub>에 비례하여 증가합니다.<br>→ 큰 내적값 → softmax 출력이 <strong>원-핫에 가깝게 포화</strong><br>→ 그래디언트가 매우 작아짐<br>√d<sub>k</sub>로 나누면 분산이 1로 정규화되어 softmax가 적절히 작동합니다."},

{topic:"트랜스포머 — 위치 인코딩",d:2,
q:`<p>트랜스포머(Transformer)에서 <strong>위치 인코딩(Positional Encoding)</strong>이 필요한 이유로 옳은 것은?</p>
<p class="q-ask">위치 인코딩이 필요한 이유는?</p>`,
hint:"셀프 어텐션 연산 자체는 입력 순서를 어떻게 처리하는지 생각해보세요.",
opts:["셀프 어텐션은 순서 불변(permutation invariant)이라 토큰 위치를 알 수 없기 때문이다",
"학습 속도를 높이기 위해서이다",
"과대적합을 방지하기 위해서이다",
"어텐션 가중치를 정규화하기 위해서이다"],ans:0,
exp:"셀프 어텐션은 입력 토큰의 <strong>순서를 고려하지 않는</strong> 집합 연산입니다.<br>→ 'AB'와 'BA'가 동일한 결과를 낳음<br>위치 인코딩을 입력 임베딩에 더하면:<br>• 각 위치에 고유한 패턴이 부여<br>• 모델이 토큰 간 상대적/절대적 위치를 학습 가능"},

{topic:"오토인코더",d:2,
q:`<p>오토인코더를 이용한 <strong>이상 탐지(anomaly detection)</strong>의 원리로 옳은 것은?</p>
<p class="q-ask">오토인코더 기반 이상 탐지의 원리는?</p>`,
hint:"오토인코더는 입력을 압축했다가 복원합니다. 학습 데이터와 다른 패턴의 데이터가 들어오면?",
opts:["정상 데이터로 학습된 오토인코더는 이상 데이터에 대해 재구성 오차가 크다",
"이상 데이터로만 학습해야 한다",
"인코더 출력 차원이 입력보다 클수록 이상 탐지 성능이 좋다",
"오토인코더는 항상 레이블이 필요하다"],ans:0,
exp:"오토인코더 기반 이상 탐지:<br>① <strong>정상 데이터</strong>로만 학습 → 정상 패턴을 잘 복원<br>② 이상 데이터 입력 시 → 학습하지 않은 패턴이므로 <strong>재구성 오차가 큼</strong><br>③ 재구성 오차가 임계값 초과 → 이상으로 분류<br>→ 비지도 학습이므로 레이블 불필요"},

{topic:"AdamW 옵티마이저",d:2,
q:`<p>AdamW 옵티마이저에 대한 설명으로 옳은 것은?</p>
<p class="q-ask">AdamW의 특성은?</p>`,
hint:"AdamW는 Adam의 변형으로, 'W'는 Weight decay를 의미합니다. L2 정규화와의 차이를 생각해보세요.",
opts:["Adam과 완전히 동일한 알고리즘이다",
"가중치 감쇠(weight decay)를 L2 정규화와 분리하여 적용한다",
"모멘텀을 사용하지 않는 옵티마이저이다",
"학습률 스케줄링이 불가능하다"],ans:1,
exp:"<strong>AdamW</strong> = Adam + Decoupled Weight Decay<br>• 기존 Adam + L2: 적응적 학습률이 정규화 효과를 왜곡<br>• AdamW: 가중치 감쇠를 그래디언트 업데이트와 <strong>분리</strong>하여 적용<br>→ 정규화 효과가 학습률과 독립적으로 작동<br>→ 딥러닝에서 일반적으로 Adam보다 선호됨"},

{topic:"Dropout",d:1,
q:`<p>Dropout에 대한 설명으로 옳은 것은?</p>
<p class="q-ask">옳은 설명은?</p>`,
hint:"Dropout은 학습 시와 추론 시 동작이 다릅니다.",
opts:["과소적합을 유발하는 기법이다",
"학습 시 무작위로 뉴런을 비활성화하여 특정 뉴런에 대한 의존도를 줄이는 정규화 기법이다",
"테스트 시에도 동일한 비율로 뉴런을 비활성화한다",
"합성곱 레이어에서는 절대 사용할 수 없다"],ans:1,
exp:"<strong>Dropout</strong>은 대표적인 정규화 기법입니다.<br>• 학습 시: 각 뉴런을 확률 p로 무작위 비활성화<br>• 추론 시: <strong>모든 뉴런 사용</strong> (출력 스케일 보정)<br>• 효과: 뉴런 간 co-adaptation 방지 → 일반화 성능 향상<br>• Conv 레이어에서도 사용 가능 (Spatial Dropout 등)"},

{topic:"배치 정규화",d:2,
q:`<p>배치 정규화(Batch Normalization)의 학습 가능한 파라미터 <code>γ</code>(스케일)와 <code>β</code>(시프트)의 역할로 옳은 것은?</p>
<p class="q-ask">γ, β 파라미터의 역할은?</p>`,
hint:"정규화로 평균 0, 분산 1이 되면 활성화 함수의 비선형성이 약해질 수 있습니다.",
opts:["정규화된 값을 다시 적절한 분포로 복원할 수 있게 하여 모델의 표현력을 유지한다",
"배치 크기를 자동으로 조절한다",
"학습률을 동적으로 조정한다",
"그래디언트 폭발을 완전히 해결한다"],ans:0,
exp:"BN 과정: x̂ = (x − μ) / σ → y = <strong>γ</strong>x̂ + <strong>β</strong><br>• 정규화(평균 0, 분산 1)만 하면 → sigmoid/tanh의 선형 영역에 갇힐 수 있음<br>• γ, β로 <strong>필요시 원래 분포 복원 가능</strong><br>• γ=σ, β=μ이면 항등 변환 → 모델이 BN을 '무시'할 수도 있음<br>→ 표현력 손실 없이 정규화 효과 확보"},

{topic:"모델 파인튜닝",d:2,
q:`<p>대규모 사전학습 모델을 소량의 도메인 데이터로 파인튜닝할 때 주의할 점으로 옳은 것은?</p>

opts:["학습률을 사전학습 때보다 크게 설정해야 한다",
"모든 층을 동결(freeze)하고 마지막 분류기만 학습하면 항상 최적이다",

{topic:"F1 점수 계산",d:2,type:'sa',
q:`<p>Precision = 0.8, Recall = 0.6일 때 F1 점수를 <strong>소수점 둘째 자리까지</strong> 구하시오.</p>

{topic:"CART — Gini 불순도",d:2,
q:`<p>이진 분류에서 한 노드에 클래스 A가 30개, 클래스 B가 10개 있을 때 Gini 불순도로 가장 가까운 값은?</p>
<p><code class="math">Gini = 1 - Σ p<sub>i</sub>²</code></p>`,
hint:"전체 40개 중 A의 비율 = 30/40 = 0.75, B의 비율 = 10/40 = 0.25",
opts:["0.250","0.375","0.500","0.125"],ans:1,
exp:"p(A) = 30/40 = 0.75, p(B) = 10/40 = 0.25<br>Gini = 1 - (0.75² + 0.25²)<br>= 1 - (0.5625 + 0.0625)<br>= 1 - 0.625 = <strong>0.375</strong><br>Gini = 0이면 완전 순수, Gini = 0.5이면 최대 불순도(이진 분류)"},

{topic:"실루엣 점수 해석",d:2,

opts:["항상 0에서 1 사이의 값을 가진다","1에 가까울수록 군집이 잘 분리되어 있고, -1에 가까울수록 잘못 배정된 것이다","값이 클수록 군집 수가 적다는 것을 의미한다","비지도학습에서는 사용할 수 없다"],ans:1,

{topic:"엘보 방법",d:1,

hint:"K를 증가시키며 Within-Cluster Sum of Squares를 관찰합니다.",
opts:["K에 따른 실루엣 점수의 최대값을 선택한다","K에 따른 군집 내 제곱합(WCSS)을 그래프로 그려 꺾이는 지점(엘보)을 선택한다","K = 데이터 수 / 10으로 항상 설정한다","가장 큰 K를 선택하는 것이 항상 최적이다"],ans:1,
exp:"<strong>엘보 방법</strong>:<br>• x축: 군집 수 K, y축: WCSS (Within-Cluster Sum of Squares)<br>• K가 증가하면 WCSS는 항상 감소<br>• 감소 폭이 급격히 줄어드는 지점 = <strong>엘보(팔꿈치)</strong><br>• 이 지점이 적정 군집 수<br>• 항상 명확한 엘보가 나타나지는 않음"},

{topic:"Isolation Forest",d:2,
q:`<p>Isolation Forest의 이상 탐지 원리로 옳은 것은?</p>`,
hint:"이상치(outlier)는 정상 데이터와 다른 특성을 가지고 있어 더 쉽게 '고립'됩니다.",
opts:["밀도가 높은 영역의 데이터를 이상치로 판단한다","무작위 분할로 데이터를 고립시킬 때 이상치는 적은 분할로도 빠르게 고립된다","클러스터 중심에서 먼 데이터를 이상치로 판단한다","오토인코더와 동일한 원리를 사용한다"],ans:1,
exp:"<strong>Isolation Forest</strong>의 원리:<br>• 무작위로 특성과 분할값을 선택하여 데이터를 재귀적으로 분할<br>• <strong>이상치</strong>: 주변에 비슷한 데이터가 적음 → <strong>적은 분할</strong>로 고립<br>• <strong>정상 데이터</strong>: 밀집 영역 → 많은 분할이 필요<br>• 경로 길이(path length)가 짧을수록 이상치일 확률 높음"},

/* ═══════════════════════════════════════════════════
   1-4. 데이터 사이언스 기초 (Q19 ~ Q25)
   ═══════════════════════════════════════════════════ */
{topic:"Stratified K-Fold",d:2,
q:`<p>Stratified K-Fold 교차검증이 일반 K-Fold보다 권장되는 경우로 옳은 것은?</p>`,
hint:"Stratified는 '계층화된'이라는 뜻입니다. 클래스 분포와 관련이 있습니다.",
opts:["특성의 수가 매우 많을 때","클래스 비율이 불균형한 분류 문제에서 각 폴드에 클래스 비율을 유지하기 위해","회귀 문제에서 항상 사용해야 한다","데이터가 시계열일 때"],ans:1,
exp:"<strong>Stratified K-Fold</strong>:<br>• 각 폴드에서 <strong>클래스 비율을 원본과 동일하게</strong> 유지<br>• 예: 양성 10%, 음성 90% → 각 폴드도 10%:90%<br>• 불균형 데이터에서 일반 K-Fold를 쓰면 일부 폴드에 소수 클래스가 없을 수 있음<br>• scikit-learn: <code>StratifiedKFold</code>"},

{topic:"SMOTE",d:2,
q:`<p>불균형 데이터 처리 기법인 <strong>SMOTE</strong>에 대한 설명으로 옳은 것은?</p>`,
hint:"SMOTE는 Synthetic Minority Over-sampling Technique의 약자입니다.",
opts:["다수 클래스의 샘플을 무작위로 제거한다","소수 클래스의 기존 샘플을 단순 복제한다","소수 클래스의 샘플 사이를 보간하여 합성 샘플을 생성한다","다수 클래스에 가중치를 부여한다"],ans:2,
exp:"<strong>SMOTE</strong>의 원리:<br>① 소수 클래스 샘플 선택<br>② 해당 샘플의 K-최근접 이웃 중 하나를 무작위 선택<br>③ 두 샘플 사이의 선분 위에서 <strong>합성(synthetic) 샘플</strong> 생성<br>→ 단순 복제와 달리 새로운 데이터 포인트를 만들어 과대적합 위험 감소"},

{topic:"VIF 다중공선성",d:2,
q:`<p>다중공선성(Multicollinearity) 진단 지표인 <strong>VIF(분산 팽창 인수)</strong>에 대한 설명으로 옳은 것은?</p>`,
hint:"VIF = 1 / (1 - R²). R²가 높으면 다른 특성으로 해당 특성을 잘 예측할 수 있다는 의미입니다.",
opts:["VIF가 1이면 심각한 다중공선성이 있다","VIF가 클수록(일반적으로 10 이상) 다중공선성이 심하다","VIF는 종속 변수와의 상관만 측정한다","VIF는 항상 0에서 1 사이의 값을 가진다"],ans:1,
exp:"<strong>VIF</strong> (Variance Inflation Factor):<br>• 각 독립 변수를 나머지 독립 변수로 회귀한 R²를 이용<br>• VIF = 1/(1−R²)<br>• VIF = 1: 다중공선성 없음<br>• VIF = 5~10: 주의 필요<br>• <strong>VIF > 10</strong>: 심각한 다중공선성 → 해당 변수 제거 또는 PCA 고려"},

{topic:"데이터 누수 유형",d:2,
q:`<p>다음 중 <strong>데이터 누수(Data Leakage)</strong>에 해당하는 경우로 옳은 것은?</p>`,
hint:"데이터 누수는 모델이 학습 시 실제 예측 시점에서 알 수 없는 정보를 사용하는 것입니다.",
opts:["학습 데이터에 결측치가 있는 경우","전체 데이터에 대해 표준화를 수행한 후 학습/검증 세트로 분할한 경우","학습 데이터의 양이 부족한 경우","과소적합이 발생한 경우"],ans:1,
exp:"<strong>데이터 누수</strong> 유형:<br>• <strong>전처리 누수</strong>: 전체 데이터로 스케일링 → 검증 데이터 정보가 학습에 반영 ✗<br>• <strong>타겟 누수</strong>: 예측 시점에 알 수 없는 미래 정보를 특성으로 사용<br>• 올바른 방법: 먼저 분할 → 학습 데이터로만 전처리 fit → 검증 데이터에 transform<br>• Pipeline 사용이 누수를 방지하는 좋은 방법"},

{topic:"PR 곡선 vs ROC",d:2,
q:`<p>양성 클래스가 전체의 2%인 극심한 불균형 데이터에서 모델 성능 평가에 더 적합한 곡선으로 옳은 것은?</p>`,
hint:"ROC 곡선의 FPR은 음성 샘플 수가 많을 때 낮은 값을 유지하기 쉽습니다.",
opts:["ROC 곡선이 항상 더 적합하다","PR(Precision-Recall) 곡선이 더 적합하다","두 곡선의 정보가 항상 동일하므로 차이가 없다","정확도(Accuracy) 곡선이 가장 적합하다"],ans:1,
exp:"극심한 불균형 데이터에서 <strong>PR 곡선</strong>이 더 적합한 이유:<br>• ROC의 FPR = FP/(FP+TN): TN이 매우 많으면 FPR이 항상 낮아 보임<br>• → ROC AUC가 과도하게 높게 나옴 (실제 성능보다 낙관적)<br>• PR 곡선: Precision과 Recall만 사용 → 양성 클래스에 집중<br>• <strong>불균형이 심할수록 PR 곡선이 더 정직한 평가</strong>"},

{topic:"Log Loss",d:2,
q:`<p>이진 분류에서 실제 레이블이 1이고 모델의 예측 확률이 0.9일 때, 해당 샘플의 Log Loss에 가장 가까운 값은?</p>
<p><code class="math">Log Loss = -[y·log(p) + (1-y)·log(1-p)]</code></p>`,
hint:"y=1이므로 -log(0.9)만 계산하면 됩니다. log는 자연로그(ln)입니다.",
opts:["0.02","0.05","0.11","0.30"],ans:2,
exp:"y=1, p=0.9일 때:<br>Log Loss = -[1 × log(0.9) + 0 × log(0.1)]<br>= -log(0.9)<br>= -(-0.1054) = <strong>0.1054 ≈ 0.11</strong><br>• 예측이 정확할수록(p→1) Log Loss → 0<br>• 예측이 틀릴수록(p→0) Log Loss → ∞"},

{topic:"Label Encoding vs One-Hot",d:1,
q:`<p>범주형 변수 인코딩에서 <strong>Label Encoding</strong>이 One-Hot Encoding보다 적합한 경우로 옳은 것은?</p>`,
hint:"Label Encoding은 범주에 정수를 부여합니다. 이 정수 간의 크기 관계가 의미 있는 경우를 생각해보세요.",
opts:["혈액형(A, B, AB, O)처럼 순서가 없는 범주","학력(초졸, 중졸, 고졸, 대졸)처럼 순서가 있는 범주","색상(빨강, 파랑, 초록)처럼 명목형 범주","Label Encoding이 항상 더 우수하다"],ans:1,
exp:"<strong>Label Encoding</strong>: 범주 → 정수 (0, 1, 2, 3, ...)<br>• 정수 간 크기 관계가 부여됨<br>• <strong>순서형 변수</strong>(초졸 < 중졸 < 고졸 < 대졸)에 적합<br>• 명목형 변수(혈액형, 색상)에 쓰면 모델이 거짓 순서 관계를 학습 ✗<br>→ 명목형에는 <strong>One-Hot Encoding</strong>이 적합"},

/* ═══════════════════════════════════════════════════
   2-1. 신경망 (Q26 ~ Q31)
   ═══════════════════════════════════════════════════ */
{topic:"Xavier 초기화",d:2,
q:`<p>Xavier(Glorot) 가중치 초기화의 목적으로 옳은 것은?</p>`,
hint:"각 층의 출력 분산이 입력 분산과 비슷하게 유지되어야 합니다.",
opts:["모든 가중치를 0으로 초기화한다","각 층의 입력과 출력의 분산을 일정하게 유지하여 그래디언트 소실/폭발을 방지한다","학습률을 자동으로 조정한다","배치 정규화를 대체한다"],ans:1,
exp:"<strong>Xavier 초기화</strong>:<br>• 가중치를 Var(w) = 2/(n_in + n_out)으로 초기화<br>• n_in: 입력 뉴런 수, n_out: 출력 뉴런 수<br>• 각 층의 출력 분산 ≈ 입력 분산 → <strong>신호가 안정적으로 전달</strong><br>• sigmoid/tanh에 적합, ReLU에는 He 초기화가 더 적합<br>• 모든 가중치 0으로 하면 대칭성 문제 발생"},

{topic:"학습률이 너무 클 때",d:1,
q:`<p>신경망 학습 시 <strong>학습률(learning rate)</strong>이 너무 크면 발생하는 현상으로 가장 옳은 것은?</p>`,
hint:"학습률이 크면 가중치 업데이트 폭이 커지므로 최적점을 지나칠 수 있습니다.",
opts:["손실이 매우 느리게 감소한다","손실이 발산하거나 진동하여 수렴하지 않는다","항상 전역 최적해에 도달한다","과소적합이 반드시 발생한다"],ans:1,
exp:"학습률이 <strong>너무 크면</strong>:<br>• 가중치 업데이트 폭이 과도 → 최적점을 <strong>건너뛰어</strong> 버림<br>• 손실이 감소하지 않고 <strong>진동</strong>하거나 <strong>발산</strong><br>• NaN 값이 발생할 수도 있음<br>반대로 너무 작으면: 수렴이 매우 느리고, 지역 최솟값에 갇힐 수 있음"},

{topic:"모멘텀 옵티마이저",d:2,
q:`<p>경사하강법에 <strong>모멘텀(Momentum)</strong>을 추가하는 이유로 옳은 것은?</p>`,
hint:"물리학의 관성(momentum)과 비슷합니다. 이전 업데이트 방향을 기억합니다.",
opts:["학습률을 자동으로 감소시킨다","이전 그래디언트의 방향을 누적하여 진동을 줄이고 수렴 속도를 높인다","가중치를 0에 가깝게 유지한다","배치 크기를 자동으로 조절한다"],ans:1,
exp:"<strong>모멘텀</strong>의 효과:<br>• v_t = β·v_{t-1} + η·∇L (이전 속도를 β비율로 유지)<br>• 같은 방향 연속 → 속도 <strong>가속</strong><br>• 방향 변경(진동) → 상쇄되어 <strong>감속</strong><br>• 안장점(saddle point) 탈출에도 도움<br>• 일반적으로 β = 0.9 사용"},

{topic:"그래디언트 클리핑",d:2,
q:`<p>신경망 학습에서 <strong>그래디언트 클리핑(Gradient Clipping)</strong>의 목적으로 옳은 것은?</p>`,
hint:"그래디언트가 비정상적으로 커지는 상황을 생각해보세요.",
opts:["그래디언트 소실 문제를 해결한다","그래디언트의 크기가 임계값을 초과하면 잘라내어 그래디언트 폭발을 방지한다","학습률을 대체한다","가중치를 정규화한다"],ans:1,
exp:"<strong>그래디언트 클리핑</strong>:<br>• 그래디언트 노름이 임계값(threshold)을 초과하면 <strong>스케일링</strong>하여 줄임<br>• <strong>그래디언트 폭발(exploding gradient)</strong> 방지가 목적<br>• 특히 RNN/LSTM 학습에서 중요<br>• PyTorch: <code>torch.nn.utils.clip_grad_norm_()</code><br>• 그래디언트 소실은 해결하지 않음 (별도 기법 필요)"},

{topic:"Softmax 함수 성질",d:2,
q:`<p>Softmax 함수에 대한 설명으로 옳지 않은 것은?</p>
<p><code class="math">softmax(z<sub>i</sub>) = e<sup>z_i</sup> / Σ e<sup>z_j</sup></code></p>`,
hint:"Softmax 출력값들의 합과 범위를 생각해보세요.",
opts:["모든 출력값의 합은 1이다","각 출력값은 0에서 1 사이이다","출력값 중 음수가 존재할 수 있다","가장 큰 입력값에 대응하는 출력이 가장 크다"],ans:2,
exp:"<strong>Softmax</strong> 함수의 성질:<br>• 모든 출력의 합 = <strong>1</strong> ✓<br>• 각 출력 ∈ <strong>(0, 1)</strong> ✓ (지수 함수이므로 항상 양수)<br>• <strong>음수 불가능</strong> → ③이 틀림<br>• 입력의 순서를 보존 (monotonic) ✓<br>• 확률 분포로 해석 가능"},

{topic:"Weight Decay",d:2,
q:`<p>신경망 학습에서 <strong>가중치 감쇠(Weight Decay)</strong>의 효과로 옳은 것은?</p>`,
hint:"Weight Decay는 매 업데이트마다 가중치를 일정 비율 줄이는 것입니다.",
opts:["가중치가 커지는 것을 억제하여 과대적합을 방지한다","학습 속도를 높인다","가중치를 항상 양수로 유지한다","은닉층의 수를 줄인다"],ans:0,
exp:"<strong>Weight Decay</strong>:<br>• 매 업데이트 시 가중치에 (1 - λ)를 곱함<br>• w ← w - η·∇L - η·λ·w<br>• 효과: 가중치가 <strong>과도하게 커지는 것을 방지</strong><br>• → 모델 복잡도 감소 → <strong>과대적합 방지</strong><br>• L2 정규화와 유사하지만, AdamW에서는 분리 적용"},

/* ═══════════════════════════════════════════════════
   2-2. 딥러닝 (Q32 ~ Q40)
   ═══════════════════════════════════════════════════ */
{topic:"CNN 수용 영역",d:2,
q:`<p>CNN에서 3x3 합성곱 레이어를 2개 쌓았을 때, 두 번째 레이어의 한 뉴런이 볼 수 있는 입력 이미지의 <strong>수용 영역(Receptive Field)</strong> 크기는?</p>`,
hint:"첫 번째 레이어에서 3x3을 보고, 두 번째 레이어에서 그 결과의 3x3을 봅니다.",
opts:["3x3","5x5","7x7","9x9"],ans:1,
exp:"<strong>수용 영역</strong> 계산 (stride=1, no padding 가정):<br>• 1번째 3x3 Conv: 수용 영역 = <strong>3x3</strong><br>• 2번째 3x3 Conv: 각 위치가 이전 층의 3x3을 참조<br>→ 원본 기준 3+3-1 = <strong>5x5</strong><br>• 일반 공식: r = r + (k-1) × stride_prod<br>• 3x3 두 개 ≈ 5x5 한 개의 수용 영역 (파라미터는 더 적음)"},

{topic:"ResNet 스킵 연결",d:2,
q:`<p>ResNet의 <strong>스킵 연결(Skip Connection)</strong>이 해결하는 핵심 문제로 옳은 것은?</p>`,
hint:"매우 깊은 네트워크에서 층을 추가하면 오히려 성능이 떨어지는 현상을 생각해보세요.",

q:`<p>5개의 데이터 포인트에 <strong>차수 4의 다항 회귀</strong>를 적합하면 어떤 현상이 발생하는가?</p>`,
hint:"차수 4의 다항식은 5개의 계수를 가집니다. 데이터 포인트가 5개이면 방정식의 수와 미지수의 수가 같습니다.",
opts:["과소적합이 발생하여 직선에 가깝게 된다",
"모든 데이터 포인트를 정확히 지나가며 과대적합 위험이 높다",
"다항 회귀는 5개 이상의 데이터에서만 작동한다",
"자동으로 릿지 정규화가 적용된다"],ans:1,
exp:"차수 d의 다항식은 d+1개의 파라미터를 가집니다.<br>차수 4 → 5개 파라미터, 데이터 5개 → 모든 점을 정확히 지남<br>이는 <strong>보간(interpolation)</strong>에 해당하며:<br>• 학습 오차 = 0<br>• 새 데이터에 대해 극단적으로 진동 → <strong>과대적합</strong>"},

{topic:"LightGBM vs XGBoost",d:2,
q:`<p>LightGBM이 XGBoost에 비해 갖는 특성으로 옳은 것은?</p>`,
hint:"LightGBM은 'Light'라는 이름처럼 속도와 효율성에 초점을 둡니다. 트리 성장 방식의 차이를 생각해보세요.",
opts:["항상 XGBoost보다 정확도가 높다",
"leaf-wise 트리 성장 방식을 사용하여 대규모 데이터에서 학습 속도가 빠르다",
"범주형 변수를 처리할 수 없다",
"GPU 학습을 지원하지 않는다"],ans:1,
exp:"<strong>LightGBM</strong>의 특징:<br>• <strong>Leaf-wise</strong> 성장: 손실 감소가 큰 리프를 우선 분할 → 빠른 수렴<br>• XGBoost: Level-wise 성장 (같은 깊이의 모든 노드 분할)<br>• GOSS(Gradient-based One-Side Sampling) → 대규모 데이터 효율적<br>• 범주형 변수 직접 처리 가능<br>• 정확도는 데이터에 따라 다름"},

{topic:"로지스틱 회귀 다중 클래스",d:2,
q:`<p>로지스틱 회귀를 3개 이상의 클래스 분류에 확장할 때 사용하는 방법으로 옳은 것은?</p>`,
hint:"로지스틱 회귀의 시그모이드를 다중 클래스로 일반화한 함수가 있습니다.",
opts:["시그모이드 함수를 그대로 사용한다",
"softmax 함수를 사용하여 각 클래스의 확률을 출력한다",
"각 클래스에 별도의 회귀식을 적용하고 MSE로 학습한다",
"다중 클래스 분류는 로지스틱 회귀로 불가능하다"],ans:1,
exp:"다중 클래스 로지스틱 회귀(=Multinomial Logistic Regression):<br>• <strong>Softmax</strong> 함수: 각 클래스의 점수를 확률로 변환<br>• P(y=k) = exp(z_k) / Σ exp(z_j)<br>• 모든 클래스 확률의 합 = 1<br>• 또는 OvR(One-vs-Rest) 방식으로 이진 분류기 K개를 사용할 수도 있습니다."},

{topic:"결정 경계 시각화",d:1,
q:`<p>2차원 특성 공간에서 <strong>결정 경계(decision boundary)</strong>를 시각화할 때 사용하는 기법으로 가장 적합한 것은?</p>`,
hint:"격자 점마다 예측을 수행하고, 예측 클래스가 바뀌는 경계선을 그립니다.",
opts:["meshgrid로 격자를 생성하고 각 점의 예측값을 contourf로 표시한다",
"학습 데이터의 히스토그램을 그린다",
"ROC 곡선을 그린다",
"산점도에 회귀선을 추가한다"],ans:0,
exp:"결정 경계 시각화 절차:<br>① <code>np.meshgrid</code>로 2D 격자 생성<br>② 모든 격자 점에 대해 모델 예측 수행<br>③ <code>plt.contourf</code>로 예측 클래스를 색으로 표시<br>④ 실제 데이터를 산점도로 겹쳐 표시<br>→ 모델이 공간을 어떻게 분할하는지 시각적으로 확인 가능"},

{topic:"앙상블 스태킹",d:3,
q:`<p>앙상블 학습에서 <strong>스태킹(Stacking)</strong>에 대한 설명으로 옳은 것은?</p>`,
hint:"스태킹은 여러 모델의 예측을 '메타 모델'이 결합하는 기법입니다.",
opts:["동일한 모델을 여러 번 반복 학습하는 기법이다",
"기본 모델(base learner)들의 예측을 메타 모델이 학습하여 최종 예측을 수행한다",
"모든 기본 모델의 예측을 단순 평균하는 기법이다",
"기본 모델의 가중치를 공유하는 기법이다"],ans:1,
exp:"<strong>스태킹(Stacking)</strong>:<br>① 다양한 기본 모델(예: RF, SVM, KNN)을 학습<br>② 각 모델의 예측값을 새로운 특성으로 사용<br>③ <strong>메타 모델(blender)</strong>이 이 특성을 입력으로 최종 예측<br>• 단순 평균(voting)보다 유연한 결합 가능<br>• 데이터 누수 방지를 위해 교차검증으로 기본 모델 예측을 생성"},

{topic:"모델 선택 편향",d:2,
q:`<p>여러 모델을 테스트 셋에서 반복 비교하여 최종 모델을 선택하면 어떤 문제가 발생하는가?</p>`,
hint:"테스트 셋에 대한 정보가 모델 선택 과정에 간접적으로 반영됩니다.",
opts:["학습 속도가 느려진다",
"테스트 셋에 과적합되어 실제 성능을 과대 추정하게 된다",
"항상 가장 단순한 모델이 선택된다",
"교차검증이 불필요해진다"],ans:1,
exp:"테스트 셋으로 반복 비교 → 테스트 셋에 <strong>간접적으로 과적합</strong>:<br>• 테스트 셋 성능이 좋은 모델을 선택 → 선택 편향(selection bias)<br>• 보고된 성능이 실제보다 <strong>과대 추정</strong>됨<br>→ 해결: <strong>검증 셋(validation set)</strong>으로 모델 선택, 테스트 셋은 최종 1회만 사용"},

{topic:"가중 투표",d:2,
q:`<p>앙상블의 가중 투표(weighted voting)에서 각 모델에 부여하는 가중치를 결정하는 기준으로 가장 적절한 것은?</p>`,
hint:"더 정확한 모델에 더 큰 영향력을 주는 것이 합리적입니다.",
opts:["모든 모델에 동일한 가중치를 부여한다",
"학습 시간이 오래 걸린 모델에 높은 가중치를 부여한다",
"검증 셋 성능이 좋은 모델에 높은 가중치를 부여한다",
"파라미터 수가 많은 모델에 높은 가중치를 부여한다"],ans:2,
exp:"가중 투표(Weighted Voting):<br>• 각 모델의 <strong>검증 성능</strong>에 비례하여 가중치 할당<br>• 정확도 높은 모델의 의견이 더 크게 반영됨<br>• 단순 투표(uniform voting)보다 성능 향상 가능<br>• 학습 시간이나 파라미터 수는 성능과 직접 관련 없음"},

/* ═══════════════════════════════════════════════════

{topic:"OPTICS vs DBSCAN",d:2,
q:`<p>OPTICS 알고리즘이 DBSCAN에 비해 갖는 장점으로 옳은 것은?</p>`,
hint:"DBSCAN은 전역 밀도 파라미터(eps)를 사용하지만, 실제 데이터에서는 밀도가 균일하지 않을 수 있습니다.",
opts:["항상 DBSCAN보다 빠르게 실행된다",
"밀도가 다른 군집도 탐지할 수 있어 eps 선택에 덜 민감하다",
"군집 수 K를 미리 지정해야 한다",
"노이즈 포인트를 탐지할 수 없다"],ans:1,
exp:"<strong>OPTICS</strong> (Ordering Points To Identify Clustering Structure):<br>• DBSCAN의 확장으로, <strong>다양한 밀도</strong>의 군집을 탐지 가능<br>• 도달 거리(reachability distance) 기반의 순서를 생성<br>• eps에 덜 민감하고, reachability plot으로 군집 구조 시각화 가능<br>• DBSCAN처럼 노이즈 포인트도 식별합니다."},

{topic:"Mean Shift",d:2,
q:`<p>Mean Shift 군집화에 대한 설명으로 옳은 것은?</p>`,
hint:"Mean Shift는 커널 밀도 추정(KDE)을 기반으로, 각 데이터 포인트를 밀도가 높은 방향으로 이동시킵니다.",
opts:["군집 수 K를 미리 지정해야 한다",
"데이터 포인트를 커널 밀도 함수의 극대점(mode)으로 반복 이동시켜 군집을 형성한다",
"구형 군집만 찾을 수 있다",
"이상치를 전혀 처리할 수 없다"],ans:1,
exp:"<strong>Mean Shift</strong> 알고리즘:<br>① 각 데이터 포인트에 대해 bandwidth 내 이웃의 평균(mean) 위치 계산<br>② 해당 평균 방향으로 포인트를 이동(shift)<br>③ 수렴할 때까지 반복 → 밀도의 <strong>극대점(mode)</strong>으로 모임<br>• 군집 수 자동 결정 ✓<br>• bandwidth가 핵심 하이퍼파라미터"},

{topic:"NMF 토픽 모델링",d:2,
q:`<p>NMF(Non-negative Matrix Factorization)를 토픽 모델링에 사용할 때의 특성으로 옳은 것은?</p>`,
hint:"NMF는 행렬을 두 개의 음이 아닌 행렬의 곱으로 분해합니다.",
opts:["분해된 행렬의 원소가 음수일 수 있어 해석이 어렵다",
"입력 행렬과 분해 결과 모두 음이 아닌 값이므로 부분(part-based) 표현에 적합하다",
"확률적 모델이므로 실행할 때마다 반드시 동일한 결과가 나온다",
"PCA와 수학적으로 동일한 알고리즘이다"],ans:1,
exp:"<strong>NMF</strong>: V ≈ W × H (V, W, H 모두 ≥ 0)<br>• 음이 아닌 제약 → 각 토픽은 단어의 <strong>양의 가중합</strong>으로 표현<br>• 직관적 해석: 각 문서 = 토픽 비율의 합, 각 토픽 = 단어 비율의 합<br>• PCA는 음수 허용 → 해석이 어려울 수 있음<br>• NMF는 비확률적이지만 초기값에 따라 결과 변동 가능"},

{topic:"병합 군집화 Ward",d:2,
q:`<p>병합(agglomerative) 군집화에서 <strong>Ward 연결법(Ward linkage)</strong>의 군집 병합 기준은?</p>`,
hint:"Ward 방법은 분산(variance)을 최소화하는 관점에서 군집을 병합합니다.",
opts:["두 군집 중심 간 거리가 최소인 쌍을 병합한다",
"두 군집을 합쳤을 때 전체 분산 증가량이 최소인 쌍을 병합한다",
"두 군집에서 가장 가까운 데이터 포인트 간 거리가 최소인 쌍을 병합한다",
"두 군집에서 가장 먼 데이터 포인트 간 거리가 최소인 쌍을 병합한다"],ans:1,
exp:"<strong>Ward 연결법</strong>: 병합 시 <strong>전체 군집 내 분산(SSE) 증가량</strong>이 최소인 쌍을 선택<br>• 결과적으로 컴팩트하고 크기가 비슷한 군집 형성 경향<br>• ①은 centroid linkage<br>• ③은 single linkage (최단 연결법)<br>• ④는 complete linkage (최장 연결법)"},

{topic:"레이블 없는 군집 평가",d:2,
q:`<p>정답 레이블이 없을 때 군집화 품질을 평가하는 내부 지표(internal metric)로 옳은 것은?</p>`,
hint:"외부 지표(ARI, NMI)는 정답 레이블이 필요하고, 내부 지표는 데이터 자체의 구조만 사용합니다.",
opts:["ARI (Adjusted Rand Index)",
"실루엣 점수 (Silhouette Score)",
"NMI (Normalized Mutual Information)",
"F1 점수"],ans:1,
exp:"<strong>실루엣 점수(Silhouette Score)</strong>:<br>• 각 샘플에 대해 (b − a) / max(a, b) 계산<br>• a: 같은 군집 내 평균 거리, b: 가장 가까운 다른 군집까지 평균 거리<br>• 범위 [-1, 1], 1에 가까울수록 좋은 군집<br>• <strong>레이블 불필요</strong> (내부 지표)<br>• ARI, NMI, F1은 모두 정답 레이블이 필요합니다."},

/* ═══════════════════════════════════════════════════
   1-4. 데이터 사이언스 기초 (Q19 ~ Q25)
   ═══════════════════════════════════════════════════ */
{topic:"중첩 교차검증",d:3,
q:`<p>중첩 교차검증(nested cross-validation)에서 내부 루프(inner loop)와 외부 루프(outer loop)의 역할로 옳은 것은?</p>`,
hint:"일반 교차검증은 모델 선택과 성능 평가를 한 루프에서 하지만, 중첩 교차검증은 분리합니다.",
opts:["내부에서 성능 평가, 외부에서 하이퍼파라미터 튜닝",
"내부에서 하이퍼파라미터 튜닝, 외부에서 일반화 성능 추정",
"내부와 외부 모두 같은 역할을 수행한다",
"내부에서 특성 선택, 외부에서 데이터 증강"],ans:1,
exp:"<strong>중첩 교차검증(Nested CV)</strong>:<br>• <strong>내부 루프</strong>: 하이퍼파라미터 튜닝 (GridSearchCV 등)<br>• <strong>외부 루프</strong>: 선택된 모델의 일반화 성능 추정<br>→ 모델 선택과 평가가 <strong>분리</strong>되어 편향 없는 성능 추정 가능<br>일반 CV로 튜닝+평가를 동시에 하면 낙관적 편향 발생"},

{topic:"시계열 분할",d:2,
q:`<p>시계열 데이터에서 일반적인 k-fold 교차검증 대신 <strong>TimeSeriesSplit</strong>을 사용하는 이유로 옳은 것은?</p>`,
hint:"시계열에서는 미래 데이터로 과거를 예측하면 안 됩니다. 시간 순서가 중요합니다.",
opts:["일반 k-fold보다 계산이 빠르기 때문이다",
"시간적 순서를 유지하여 미래 데이터가 학습에 사용되는 것(data leakage)을 방지한다",
"시계열 데이터는 항상 정상(stationary)이기 때문이다",
"분할 수를 자동으로 결정해주기 때문이다"],ans:1,
exp:"<strong>TimeSeriesSplit</strong>:<br>• 학습 = 과거 데이터, 검증 = 그 직후 미래 데이터<br>• 미래 정보가 학습에 유입되는 것을 <strong>방지</strong><br>• 일반 k-fold: 무작위 섞기 → 미래 데이터가 학습에 포함될 수 있음<br>• 시계열은 자기상관(autocorrelation)이 있어 무작위 분할이 부적절"},

{topic:"타겟 누수",d:2,
q:`<p>다음 중 <strong>타겟 누수(target leakage)</strong>의 예로 가장 옳은 것은?</p>`,
hint:"타겟 누수는 예측 시점에 알 수 없는 정보가 특성에 포함되는 경우입니다.",
opts:["학습 데이터와 테스트 데이터를 7:3으로 분할한 것",
"'환불 여부' 특성을 사용하여 '구매 취소'를 예측하는 것",
"특성 수가 샘플 수보다 많은 것",
"교차검증의 폴드 수를 5로 설정한 것"],ans:1,
exp:"<strong>타겟 누수(Target Leakage)</strong>:<br>• '환불 여부'는 '구매 취소' <strong>이후에</strong> 결정되는 정보<br>• 예측 시점에는 알 수 없는 미래 정보 → 특성으로 사용하면 누수<br>• 학습 시 정확도가 비정상적으로 높지만, 실제 서비스에서는 사용 불가<br>→ 특성이 예측 시점에 사용 가능한지 항상 확인 필요"},

{topic:"Matthews 상관 계수",d:2,
q:`<p>Matthews Correlation Coefficient(MCC)에 대한 설명으로 옳은 것은?</p>`,
hint:"MCC는 혼동행렬의 네 값(TP, TN, FP, FN)을 모두 사용하는 균형 잡힌 지표입니다.",
opts:["0에서 1 사이의 값만 가진다",
"-1에서 1 사이의 값을 가지며 클래스 불균형에도 신뢰할 수 있는 지표이다",
"다중 클래스 분류에는 사용할 수 없다",
"F1 점수와 항상 같은 값을 가진다"],ans:1,
exp:"<strong>MCC (Matthews Correlation Coefficient)</strong>:<br>• 범위: <strong>[-1, +1]</strong> (1=완벽, 0=무작위, -1=완전 반대)<br>• TP, TN, FP, FN 모두 고려 → <strong>불균형 데이터에 강건</strong><br>• 정확도(Accuracy)는 불균형 시 오도할 수 있지만 MCC는 신뢰성 있음<br>• 다중 클래스로 확장 가능 (scikit-learn에서 지원)"},

{topic:"보정 곡선",d:2,
q:`<p>분류 모델의 <strong>보정 곡선(calibration curve)</strong>이 대각선(y=x)에 가까울수록 의미하는 것은?</p>`,
hint:"모델이 '70% 확률로 양성'이라고 예측했을 때, 실제로 70%가 양성이면 잘 보정된 것입니다.",
opts:["모델의 정확도가 100%에 가깝다",
"예측 확률이 실제 빈도와 잘 일치하여 모델이 잘 보정되어 있다",
"모델이 과소적합되었다",
"특성 간 상관관계가 없다"],ans:1,
exp:"<strong>보정 곡선(Calibration Curve)</strong>:<br>• x축: 모델의 예측 확률, y축: 실제 양성 비율<br>• <strong>대각선(y=x)에 가까움</strong> = 잘 보정됨<br>• 예: 예측 확률 0.8인 샘플 중 실제로 80%가 양성<br>• Platt Scaling, Isotonic Regression으로 보정 가능<br>• 보정과 정확도는 다른 개념입니다."},

{topic:"구간화 (Binning)",d:1,
q:`<p>연속형 특성을 <strong>구간화(binning)</strong>하여 범주형으로 변환하는 것의 장점으로 옳은 것은?</p>`,
hint:"나이를 10대/20대/30대로 구간화하면 정확한 나이 정보는 잃지만 노이즈에 강해질 수 있습니다.",
opts:["항상 모델 성능이 향상된다",
"이상치와 노이즈의 영향을 줄이고 비선형 관계를 포착하는 데 도움이 된다",
"데이터의 차원이 감소한다",
"연속 변수의 모든 정보가 보존된다"],ans:1,
exp:"<strong>구간화(Binning)</strong>의 장점:<br>• 이상치가 같은 구간에 포함 → <strong>노이즈 영향 감소</strong><br>• 선형 모델에서 <strong>비선형 관계</strong>를 포착 가능<br>단점:<br>• 정보 손실 (구간 내 차이 무시)<br>• 구간 경계 선택에 민감<br>• 항상 성능이 좋아지는 것은 아님"},

{topic:"Box-Cox 변환",d:2,
q:`<p>Box-Cox 변환에 대한 설명으로 옳은 것은?</p>`,
hint:"Box-Cox는 데이터의 분포를 정규분포에 가깝게 만드는 변환입니다. λ 파라미터에 따라 변환 형태가 달라집니다.",
opts:["음수 값을 포함하는 데이터에 직접 적용할 수 있다",
"양수 데이터의 분포를 정규분포에 가깝게 만들며 λ=0일 때 log 변환과 같다",
"항상 λ=1이 최적이다",
"데이터의 스케일만 변환하고 분포 형태는 변하지 않는다"],ans:1,
exp:"<strong>Box-Cox 변환</strong>:<br>• λ≠0: y' = (y^λ − 1) / λ<br>• <strong>λ=0: y' = log(y)</strong> (자연로그 변환)<br>• λ=0.5: 제곱근 변환에 대응<br>• <strong>양수 데이터에만 적용</strong> 가능 (음수 포함 시 Yeo-Johnson 사용)<br>• λ는 최대우도법(MLE)으로 자동 최적화 가능"},

{topic:"He 초기화",d:2,
q:`<p>ReLU 활성화 함수를 사용하는 신경망에서 가중치 초기화 방법으로 가장 적합한 것은?</p>`,
hint:"Xavier 초기화는 시그모이드/tanh에 적합하고, ReLU에는 다른 초기화가 권장됩니다.",
opts:["모든 가중치를 0으로 초기화한다",
"Xavier(Glorot) 초기화를 사용한다",
"He(Kaiming) 초기화를 사용한다",
"모든 가중치를 1로 초기화한다"],ans:2,
exp:"<strong>He 초기화</strong>: Var(w) = 2 / n_in<br>• ReLU는 음의 영역을 0으로 만들어 분산이 절반으로 줄어듦<br>• He 초기화는 이를 보상하여 2/n_in으로 설정<br>• Xavier: Var(w) = 1/n_in → 시그모이드/tanh에 적합<br>• 0이나 1로 초기화하면 대칭성 문제 또는 그래디언트 폭발 발생"},

{topic:"Nesterov 모멘텀",d:2,
q:`<p>Nesterov Accelerated Gradient(NAG)가 일반 모멘텀(momentum)에 비해 갖는 장점으로 옳은 것은?</p>`,
hint:"일반 모멘텀은 현재 위치에서 그래디언트를 계산하지만, NAG는 모멘텀으로 이동할 위치를 미리 계산합니다.",
opts:["학습률을 자동으로 조정한다",
"모멘텀으로 이동할 예상 위치에서 그래디언트를 계산하여 오버슈팅을 줄인다",
"메모리 사용량이 일반 모멘텀보다 적다",
"모든 경우에 일반 모멘텀보다 빠르게 수렴한다"],ans:1,
exp:"<strong>Nesterov 모멘텀(NAG)</strong>:<br>• 일반 모멘텀: 현재 위치에서 그래디언트 계산 후 이동<br>• NAG: 모멘텀으로 이동할 <strong>예상 위치</strong>에서 그래디언트 계산<br>→ '미리 본(lookahead)' 그래디언트로 <strong>오버슈팅 감소</strong><br>• 수렴 속도가 개선되며, 최솟값 근처에서 진동이 줄어듦"},

{topic:"학습률 Warmup",d:2,
q:`<p>학습률 워밍업(learning rate warmup)의 목적으로 가장 옳은 것은?</p>`,
hint:"학습 초기에는 가중치가 무작위 상태이므로 큰 학습률이 위험할 수 있습니다.",
opts:["전체 학습 시간을 단축하기 위해서이다",
"초기 학습 시 큰 그래디언트로 인한 불안정한 업데이트를 방지하기 위해서이다",
"과대적합을 완전히 방지하기 위해서이다",
"GPU 메모리를 절약하기 위해서이다"],ans:1,
exp:"<strong>학습률 워밍업(LR Warmup)</strong>:<br>• 학습 초기: 가중치가 랜덤 → 그래디언트가 불안정<br>• 처음에 작은 학습률로 시작 → 점진적으로 목표 학습률까지 증가<br>→ <strong>초기 불안정성 방지</strong>, 학습 안정화<br>• Transformer 등 대규모 모델에서 특히 중요<br>• 이후 cosine annealing 등으로 학습률 감소"},

{topic:"배치 크기 효과",d:2,
q:`<p>학습 시 배치 크기(batch size)를 매우 크게 설정했을 때의 영향으로 옳은 것은?</p>`,
hint:"큰 배치 → 안정적인 그래디언트 추정이지만, 탐색 능력과 메모리 측면에서 단점이 있습니다.",
opts:["그래디언트의 분산이 커져 학습이 불안정해진다",
"그래디언트 추정이 정확해지지만 날카로운 극소(sharp minima)에 수렴할 위험이 커진다",
"항상 일반화 성능이 향상된다",
"GPU 메모리 사용량이 줄어든다"],ans:1,
exp:"<strong>큰 배치 크기</strong>의 영향:<br>• 그래디언트 추정이 정확 → 분산 작음 (안정적)<br>• 하지만 노이즈 감소 → <strong>날카로운 극소(sharp minima)에 수렴</strong> 경향<br>→ 일반화 성능 저하 가능<br>• GPU 메모리 사용량 <strong>증가</strong><br>• 작은 배치: 노이즈가 flat minima 탐색에 도움 → 일반화에 유리"},

{topic:"Dying ReLU 해결",d:2,
q:`<p>'Dying ReLU' 문제를 해결하기 위한 방법으로 옳지 않은 것은?</p>`,
hint:"Dying ReLU는 음의 영역에서 그래디언트가 0이 되어 뉴런이 영구히 비활성화되는 문제입니다.",
opts:["Leaky ReLU를 사용하여 음의 영역에 작은 기울기를 부여한다",
"ELU를 사용하여 음의 영역에서 부드러운 기울기를 유지한다",
"학습률을 매우 크게 설정한다",
"He 초기화를 적용하여 초기 가중치 분포를 적절히 설정한다"],ans:2,
exp:"Dying ReLU 해결 방법:<br>• <strong>Leaky ReLU</strong>: f(x) = max(αx, x), α=0.01 → 음의 영역에서도 기울기 유지 ✓<br>• <strong>ELU</strong>: 음의 영역에서 α(e^x − 1) → 부드러운 기울기 ✓<br>• <strong>He 초기화</strong>: 가중치가 적절한 범위 → 활성화값 0 방지 ✓<br>• 큰 학습률: 오히려 <strong>가중치가 크게 변동</strong>하여 Dying ReLU 악화"},

{topic:"계산 그래프",d:1,

opts:["학습 데이터를 시각화하기 위한 도구이다",
"순전파의 연산 과정을 기록하여 역전파 시 체인 룰로 그래디언트를 효율적으로 계산한다",
"모델의 하이퍼파라미터를 자동으로 선택한다",
"GPU와 CPU 간 메모리를 관리한다"],ans:1,
exp:"<strong>계산 그래프(Computational Graph)</strong>:<br>• 순전파(forward pass)의 모든 연산을 <strong>DAG(방향 비순환 그래프)</strong>로 기록<br>• 역전파 시 이 그래프를 역방향으로 순회<br>• 각 노드에서 <strong>체인 룰(chain rule)</strong>을 적용하여 그래디언트 계산<br>• PyTorch: 동적 계산 그래프 (매 순전파마다 새로 생성)"},

{topic:"깊이별 분리 합성곱",d:2,
q:`<p>깊이별 분리 합성곱(depthwise separable convolution)에 대한 설명으로 옳은 것은?</p>`,

opts:["표준 합성곱보다 파라미터 수와 연산량이 많다",

{topic:"Seq2Seq",d:2,

opts:["인코더만으로 구성되어 있다",

{topic:"Teacher Forcing",d:2,
q:`<p>Teacher Forcing에 대한 설명으로 옳은 것은?</p>`,
hint:"디코더의 학습 시 이전 시점의 입력으로 무엇을 사용하는지 생각해보세요.",
opts:["추론 시에만 사용하는 기법이다",
"학습 시 디코더의 입력으로 이전 시점의 실제 정답(ground truth)을 사용하여 수렴을 빠르게 한다",
"인코더의 가중치를 고정하는 기법이다",

exp:"<strong>Teacher Forcing</strong>:<br>• 학습 시: 디코더의 각 시점 입력으로 <strong>이전 시점의 정답</strong>을 사용<br>• 장점: 학습 수렴이 빠르고 안정적<br>• 단점: 학습-추론 불일치(exposure bias) — 추론 시에는 자기 예측을 사용해야 함<br>• Scheduled Sampling: teacher forcing 비율을 점진적으로 줄여 불일치 완화"},

{topic:"ViT 패치",d:2,
q:`<p>Vision Transformer(ViT)에서 이미지를 처리하는 방식으로 옳은 것은?</p>`,

exp:"정규방정식의 특성:<br>• 닫힌 형태 → 반복 불필요, 학습률 불필요<br>• 역행렬 계산 O(n³) → <strong>특성이 많으면 비용 큼</strong><br>• X<sup>T</sup>X가 특이(singular)하면 역행렬 불가 → 정규화 또는 의사역행렬 사용<br>• MSE는 볼록(convex)이므로 해가 존재하면 전역 최적해"},

{topic:"로지스틱 회귀 — 결정 경계",d:2,
q:`<p>로지스틱 회귀에서 시그모이드 함수 <code class="math">σ(z) = 1/(1+e<sup>-z</sup>)</code>를 사용합니다. 결정 경계(decision boundary)에서 <code>σ(w<sup>T</sup>x + b) = 0.5</code>가 성립하려면?</p>
<p class="q-ask"><code>w<sup>T</sup>x + b</code>의 값은?</p>`,
hint:"σ(z) = 0.5가 되려면 z가 어떤 값이어야 하는지, σ 함수의 그래프를 떠올려 보세요.",
opts:["w<sup>T</sup>x + b = 1","w<sup>T</sup>x + b = 0","w<sup>T</sup>x + b = -1","w<sup>T</sup>x + b = 0.5"],ans:1,
exp:"σ(z) = 1/(1+e<sup>-z</sup>)에서<br>σ(0) = 1/(1+1) = <strong>0.5</strong><br>따라서 결정 경계에서는 <strong>w<sup>T</sup>x + b = 0</strong>이 됩니다.<br>이 초평면이 두 클래스를 구분하는 결정 경계입니다."},

{topic:"L1 / L2 정규화",d:2,
q:`<p>Ridge 회귀(L2 정규화)의 비용 함수로 올바른 형태는?</p>
<p class="q-ask">옳은 비용 함수는?</p>`,
hint:"L1은 가중치의 절대값 합, L2는 가중치의 제곱합을 페널티로 추가합니다.",
opts:["Σ(y - ŷ)² + λΣ|w|",
"Σ(y - ŷ)² + λΣw²",
"Σ|y - ŷ| + λΣw²",
"Σ(y - ŷ)² × λΣw²"],ans:1,
exp:"<strong>Ridge (L2)</strong>: MSE + λΣw² (가중치 제곱합 페널티)<br><strong>Lasso (L1)</strong>: MSE + λΣ|w| (가중치 절대값합 페널티)<br>• ①은 Lasso의 비용 함수<br>• ③은 MAE + L2 (일반적이지 않은 조합)<br>• ④는 곱셈 형태 (올바르지 않음)"},

{topic:"K-NN — 전처리",d:2,
q:`<p>K-NN에서 특성 스케일이 크게 다를 때(예: 키 150~190cm, 연소득 2000~8000만원) 발생하는 문제와 해결 방법으로 가장 적절한 것은?</p>
<p class="q-ask">옳은 해결 방법은?</p>`,
hint:"K-NN은 거리 기반 알고리즘이므로, 스케일이 큰 특성이 거리를 지배하게 됩니다.",
opts:["K값을 크게 늘린다",
"특성별 정규화(normalization) 또는 표준화(standardization)를 적용한다",
"맨해튼 거리로 바꾸면 스케일 문제가 자동으로 해결된다",
"학습 데이터의 양을 늘린다"],ans:1,
exp:"K-NN은 <strong>거리 기반</strong> 알고리즘이므로 스케일이 큰 특성(연소득)이 거리 계산을 지배합니다.<br>→ <strong>특성별 정규화/표준화</strong>로 각 특성의 스케일을 맞춰야 합니다.<br>맨해튼 거리도 스케일 차이에 동일하게 영향받습니다."},

{topic:"의사결정 트리 — 분할 기준",d:2,
q:`<p>의사결정 트리에서 엔트로피 기반 <strong>정보 이득(Information Gain)</strong>이 가장 높은 분할을 선택하는 이유로 옳은 것은?</p>
<p class="q-ask">정보 이득이 큰 분할을 택하는 이유는?</p>`,
hint:"엔트로피는 불확실성(무질서도)의 척도입니다. 정보 이득 = 분할 전 엔트로피 - 분할 후 가중 엔트로피.",
opts:["분할 후 각 자식 노드의 불확실성이 가장 크게 감소하기 때문이다",
"분할 후 트리의 깊이가 항상 최소화되기 때문이다",
"연속 변수에만 적용 가능하기 때문이다",
"Information Gain은 항상 음수이기 때문이다"],ans:0,
exp:"<strong>Information Gain</strong> = H(부모) − Σ(비율 × H(자식))<br>IG가 클수록 분할로 인해 <strong>불확실성이 크게 감소</strong>합니다.<br>• IG는 항상 ≥ 0 (음수 아님)<br>• 범주형·연속형 모두 적용 가능<br>• 깊이 최소화를 보장하지는 않음"},

{topic:"Gradient Boosting",d:2,
q:`<p>Gradient Boosting에서 각 트리(weak learner)가 학습하는 대상은?</p>
<p class="q-ask">각 단계의 트리가 맞추는 것은?</p>`,
hint:"Boosting은 이전 모델의 오차를 보완합니다. Gradient Boosting은 구체적으로 '그래디언트'를 학습합니다.",
opts:["원본 타겟 변수 y",
"이전 모델의 잔차(residual) 또는 손실의 음의 그래디언트",
"다른 트리의 가중치",
"무작위 부트스트랩 샘플의 평균"],ans:1,
exp:"Gradient Boosting의 핵심:<br>① 이전 모델의 예측에 대한 <strong>잔차(residual)</strong>를 계산<br>② 새 트리가 이 잔차를 맞추도록 학습<br>③ 새 트리의 예측을 이전 모델에 더하여 점진적으로 개선<br>일반적으로는 손실 함수의 <strong>음의 그래디언트</strong>를 학습합니다."},

{topic:"SVM — 커널 트릭",d:2,
q:`<p>SVM에서 커널 트릭(kernel trick)의 핵심 아이디어로 옳은 것은?</p>
<p class="q-ask">커널 트릭의 원리는?</p>`,
hint:"커널 트릭은 실제로 데이터를 고차원으로 변환하지 않고도 고차원 공간에서의 내적을 계산합니다.",
opts:["데이터를 저차원으로 사영하여 연산을 줄인다",
"고차원 특성 공간에서의 내적을 원래 공간에서 커널 함수로 계산하여, 명시적 변환 없이 비선형 분류를 수행한다",
"커널 함수가 직접 결정 경계를 학습한다",
"선형 커널만 이론적으로 수렴이 보장된다"],ans:1,
exp:"<strong>커널 트릭</strong>: 고차원 매핑 φ(x)를 명시적으로 계산하지 않고,<br>K(x, x') = φ(x)·φ(x')를 직접 계산<br>→ 계산 비용을 줄이면서도 고차원 공간에서의 선형 분류 효과<br>• RBF 커널: 무한 차원 매핑에 대응<br>• 다항식 커널: 다항식 특성 공간에 대응"},

/* ═══════════════════════════════════════════════════
   1-3. 비지도학습 (Q14 ~ Q18)
   ═══════════════════════════════════════════════════ */
{topic:"K-means — 초기화",d:2,
q:`<p>K-means 알고리즘에서 초기 중심점(centroid) 선택에 따라 결과가 달라질 수 있습니다.</p>
<p class="q-ask">이를 개선하기 위한 방법으로 가장 적절한 것은?</p>`,
hint:"scikit-learn의 KMeans는 기본적으로 'k-means++' 초기화를 사용합니다.",
opts:["K값을 항상 1로 설정한다",
"K-means++ 초기화를 사용하여 초기 중심점을 분산되게 선택한다",
"항상 데이터의 처음 K개를 중심점으로 선택한다",
"초기화 방법과 관계없이 결과가 항상 동일하다"],ans:1,
exp:"<strong>K-means++</strong>: 첫 중심점을 무작위로 선택한 뒤, 이후 중심점은 기존 중심점과의 거리에 비례한 확률로 선택<br>→ 초기 중심점이 골고루 분포되어 수렴 속도 ↑, 품질 ↑<br>scikit-learn의 <code>KMeans</code>는 기본값이 <code>init='k-means++'</code>입니다."},

{topic:"PCA — 주성분",d:2,
q:`<p>PCA(주성분 분석)에서 <strong>첫 번째 주성분(PC1)</strong>이 의미하는 것으로 옳은 것은?</p>
<p class="q-ask">PC1의 의미는?</p>`,
hint:"PCA는 데이터의 분산을 최대한 보존하는 방향을 찾습니다.",
opts:["데이터의 평균 방향이다",
"데이터의 분산을 최대로 설명하는 방향이다",
"데이터의 분산을 최소화하는 방향이다",
"가장 많은 데이터 포인트가 위치하는 클러스터의 중심이다"],ans:1,
exp:"PCA의 <strong>첫 번째 주성분(PC1)</strong>은 데이터의 <strong>분산을 최대로 설명하는 방향</strong>입니다.<br>• 수학적으로: 공분산 행렬의 가장 큰 고유값에 대응하는 고유벡터<br>• PC2는 PC1에 직교하면서 남은 분산을 최대로 설명하는 방향<br>• 이런 식으로 분산 기여도가 큰 순서로 주성분이 정해집니다."},

{topic:"t-SNE",d:2,
q:`<p>t-SNE에 관한 설명으로 옳지 않은 것은?</p>
<p class="q-ask">옳지 않은 설명은?</p>`,
hint:"t-SNE는 국소 구조 보존에 강하지만, 임베딩 결과의 축 값이나 군집 간 거리에는 주의가 필요합니다.",
opts:["perplexity는 이웃의 유효 수를 조절하는 하이퍼파라미터이다",
"임베딩 결과의 축 값과 군집 간 거리에 절대적 의미가 있다",
"확률적 알고리즘이므로 실행할 때마다 결과가 달라질 수 있다",
"주로 고차원 데이터의 2D/3D 시각화에 사용된다"],ans:1,
exp:"t-SNE의 주요 특성:<br>• perplexity: 이웃의 유효 수 조절 ✓<br>• 확률적 → 매번 다른 결과 가능 ✓<br>• 2D/3D 시각화 목적 ✓<br>• <strong>임베딩의 절대 좌표와 군집 간 거리에는 의미가 없음</strong> ✗<br>→ 군집의 존재 여부와 상대적 밀집도만 해석 가능"},

{topic:"DBSCAN",d:2,
q:`<p>DBSCAN이 K-means보다 유리한 상황으로 옳은 것은?</p>
<p class="q-ask">DBSCAN이 더 적합한 경우는?</p>`,
hint:"DBSCAN은 밀도 기반 알고리즘으로, 군집 수를 미리 지정할 필요가 없습니다.",
opts:["구형(spherical)이고 크기가 비슷한 군집",
"군집 수를 미리 정확히 알고 있는 경우",
"비볼록(non-convex) 형태의 군집과 노이즈가 있는 경우",
"모든 데이터가 반드시 하나의 군집에 속해야 하는 경우"],ans:2,
exp:"DBSCAN의 장점:<br>• <strong>비볼록 형태</strong>(초승달, 고리 등)의 군집 탐지 가능<br>• <strong>노이즈 포인트</strong>를 자동으로 식별<br>• 군집 수 K를 사전에 지정하지 않음<br>반면 K-means는 구형 군집에 적합하고, 모든 데이터를 군집에 할당합니다."},

{topic:"스펙트럼 군집화",d:3,
q:`<p>스펙트럼 군집화(Spectral Clustering)에 대한 설명으로 옳은 것은?</p>
<p class="q-ask">옳은 설명은?</p>`,
hint:"스펙트럼 군집화는 그래프 이론을 기반으로 하며, 라플라시안 행렬의 고유벡터를 활용합니다.",
opts:["데이터의 유사도 그래프에서 라플라시안 행렬의 고유벡터를 이용하여 군집화한다",
"K-means와 완전히 동일한 알고리즘이다",
"반드시 구형 군집만 찾을 수 있다",
"유사도 행렬을 사용하지 않는다"],ans:0,
exp:"<strong>스펙트럼 군집화</strong> 순서:<br>① 데이터 간 유사도 행렬(affinity matrix) 구성<br>② 그래프 라플라시안 행렬 계산<br>③ 라플라시안의 <strong>고유벡터</strong>를 추출하여 새로운 특성 공간 생성<br>④ 이 공간에서 K-means 등으로 군집화<br>→ 비볼록 형태의 군집도 잘 찾을 수 있습니다."},

/* ═══════════════════════════════════════════════════
   1-4. 데이터 사이언스 기초 (Q19 ~ Q25)

{topic:"혼동행렬 — F1 계산",d:2,
q:`<p>이진 분류 모델의 혼동행렬이 아래와 같습니다.</p>
<table>
<tr><th></th><th>예측 양성</th><th>예측 음성</th></tr>
<tr><td><strong>실제 양성</strong></td><td>60</td><td>40</td></tr>
<tr><td><strong>실제 음성</strong></td><td>20</td><td>80</td></tr>
</table>
<p class="q-ask">F1 점수에 가장 가까운 값은?</p>`,
hint:"Precision = TP/(TP+FP), Recall = TP/(TP+FN), F1 = 2·P·R/(P+R)를 순서대로 계산하세요.",
opts:["0.50","0.60","0.67","0.75"],ans:2,
exp:"TP=60, FP=20, FN=40, TN=80<br>Precision = 60/(60+20) = 60/80 = <strong>0.75</strong><br>Recall = 60/(60+40) = 60/100 = <strong>0.60</strong><br>F1 = 2 × 0.75 × 0.60 / (0.75 + 0.60) = 0.90 / 1.35 ≈ <strong>0.67</strong>"},

{topic:"과대적합 vs 과소적합",d:1,
q:`<p>다음 중 <strong>과대적합(overfitting)</strong>의 전형적인 신호로 가장 옳은 것은?</p>
<p class="q-ask">과대적합의 신호는?</p>`,
hint:"과대적합은 모델이 학습 데이터에 너무 맞추어져 새로운 데이터에 일반화하지 못하는 상태입니다.",
opts:["학습 손실과 검증 손실이 모두 높다",
"학습 손실은 낮지만 검증 손실이 학습 손실보다 훨씬 높다",
"학습 손실이 검증 손실보다 높다",
"손실 곡선이 진동 없이 평탄하게 유지된다"],ans:1,
exp:"<strong>과대적합</strong>: 모델이 학습 데이터의 노이즈까지 학습<br>• 학습 손실: 매우 낮음 ✓<br>• 검증 손실: 학습 손실보다 훨씬 높음 ✓<br>→ 학습-검증 손실의 <strong>큰 격차(gap)</strong>가 핵심 신호<br>①은 과소적합, ③은 일반적이지 않은 상황입니다."},

{topic:"하이퍼파라미터 튜닝",d:2,
q:`<p>다음 중 하이퍼파라미터 탐색 전략에 대한 설명으로 옳지 않은 것은?</p>
<p class="q-ask">옳지 않은 설명은?</p>`,
hint:"그리드 서치, 랜덤 서치, 베이지안 최적화 각각의 특성을 비교해보세요.",
opts:["그리드 서치(Grid Search)는 차원이 늘수록 비용이 기하급수적으로 증가한다",
"랜덤 서치(Random Search)는 그리드 서치보다 적은 시도로도 좋은 영역을 찾는 경향이 있다",
"베이지안 최적화는 이전 시도 결과를 활용해 다음 탐색 지점을 선택한다",
"테스트 셋에서 직접 하이퍼파라미터를 튜닝하는 것이 가장 정확한 방법이다"],ans:3,
exp:"<strong>테스트 셋은 최종 평가에만 사용해야</strong> 합니다. 테스트 셋으로 튜닝하면 테스트 셋에 과적합됩니다.<br>• 그리드 서치: 모든 조합 탐색 → O(n<sup>d</sup>) 비용 ✓<br>• 랜덤 서치: 무작위 탐색 → 효율적 ✓<br>• 베이지안 최적화: 대리 모델로 유망한 지점 선택 ✓"},

{topic:"교차검증 — LOOCV",d:2,
q:`<p>k-fold 교차검증에서 k=N(전체 데이터 수, <strong>LOOCV</strong>)일 때의 특성으로 옳은 것은?</p>
<p class="q-ask">LOOCV의 특성은?</p>`,
hint:"LOOCV는 매번 1개만 남기고 N-1개로 학습합니다. 학습 데이터가 거의 전체이므로 편향은 작지만...",
opts:["편향이 크고 분산이 작다",
"편향은 작지만 분산이 크고, 계산 비용이 높다",
"항상 가장 정확한 일반화 추정을 제공한다",
"k=5일 때와 결과가 항상 동일하다"],ans:1,
exp:"<strong>LOOCV (k=N)</strong>:<br>• 학습 데이터 = N-1개 (거의 전체) → <strong>편향 작음</strong><br>• 각 폴드의 학습 데이터가 거의 동일 → 모델 간 상관 높음 → <strong>분산 큼</strong><br>• N번 학습 필요 → <strong>계산 비용 높음</strong><br>일반적으로 k=5 또는 k=10이 편향-분산 트레이드오프에서 좋은 균형점입니다."},

{topic:"ROC 곡선",d:1,
q:`<p>ROC 곡선의 x축과 y축에 해당하는 지표로 옳은 것은?</p>
<p class="q-ask">ROC 곡선의 축 구성은?</p>`,
hint:"ROC는 Receiver Operating Characteristic의 약자입니다. 양성/음성 예측의 트레이드오프를 보여줍니다.",
opts:["x축: 정밀도(Precision), y축: 재현율(Recall)",
"x축: 위양성률(FPR), y축: 진양성률(TPR)",
"x축: 재현율(Recall), y축: 정밀도(Precision)",
"x축: 정확도(Accuracy), y축: F1 점수"],ans:1,
exp:"<strong>ROC 곡선</strong>:<br>• x축: <strong>FPR</strong> (False Positive Rate) = FP/(FP+TN)<br>• y축: <strong>TPR</strong> (True Positive Rate = Recall) = TP/(TP+FN)<br>• ①③은 Precision-Recall 곡선의 축 구성입니다.<br>• AUC = ROC 곡선 아래 면적, 0.5 = 무작위, 1.0 = 완벽"},

{topic:"원-핫 인코딩",d:1,
q:`<p>원-핫 인코딩(one-hot encoding)에 대한 설명으로 옳지 않은 것은?</p>
<p class="q-ask">옳지 않은 설명은?</p>`,
hint:"원-핫 인코딩은 범주를 0/1 이진 벡터로 변환합니다. 범주 간 순서가 있을까요?",
opts:["범주형 변수를 이진 벡터로 변환한다",
"범주 수만큼의 새로운 열이 생성된다",
"범주 간 순서(크기) 정보가 보존된다",
"고유 범주 수가 매우 많으면 차원이 크게 증가한다"],ans:2,
exp:"원-핫 인코딩은 범주를 독립적인 0/1 벡터로 변환합니다.<br>• 서울=[1,0,0,0], 부산=[0,1,0,0] 등<br>• 벡터 간 거리가 모두 동일 → <strong>순서 정보 없음</strong><br>• 범주 수가 많으면 매우 고차원(sparse) → 차원의 저주<br>순서가 있는 범주에는 ordinal encoding이 적합합니다."},

{topic:"표준화 vs 정규화",d:1,
q:`<p>표준화(Standardization)와 Min-Max 정규화(Normalization)의 비교로 옳은 것은?</p>
<p class="q-ask">올바른 비교는?</p>`,
hint:"표준화는 평균과 표준편차를, 정규화는 최솟값과 최댓값을 사용합니다.",
opts:["표준화는 평균 0, 표준편차 1로 변환하고, Min-Max 정규화는 [0, 1] 범위로 변환한다",
"Min-Max 정규화는 이상치(outlier)에 더 강건하다",
"표준화와 Min-Max 정규화는 수학적으로 동일하다",
"Min-Max 정규화는 음수 값을 가진 특성에 적용할 수 없다"],ans:0,
exp:"<strong>표준화</strong>: z = (x − μ) / σ → 평균 0, 표준편차 1<br><strong>Min-Max 정규화</strong>: x' = (x − min) / (max − min) → [0, 1] 범위<br>• Min-Max는 이상치에 <strong>민감</strong> (max/min이 크게 변함)<br>• 표준화가 이상치에 상대적으로 강건함<br>• 음수 값도 정규화 가능 (예: -5 → 0에 가까운 값)"},

/* ═══════════════════════════════════════════════════
   2-1. 신경망 (Q26 ~ Q31)

{topic:"퍼셉트론",d:1,
q:`<p>단일 퍼셉트론(선형 분류기)으로 학습할 수 <strong>없는</strong> 논리 게이트는?</p>
<p class="q-ask">학습 불가능한 것은?</p>`,
hint:"단일 퍼셉트론은 선형 결정 경계만 만들 수 있습니다. 데이터가 선형 분리 가능한지 생각해보세요.",
opts:["AND","OR","NOT","XOR"],ans:3,
exp:"단일 퍼셉트론은 <strong>선형 분리 가능</strong>(linearly separable)한 문제만 학습 가능합니다.<br>• AND ✓, OR ✓, NOT ✓ — 직선 하나로 분리 가능<br>• <strong>XOR ✗</strong> — 직선 하나로 분리 불가능<br>XOR을 풀려면 은닉층이 있는 다층 퍼셉트론(MLP)이 필요합니다."},

{topic:"SGD vs 배치 경사하강법",d:2,
q:`<p>확률적 경사하강법(SGD)이 전체 배치(batch) 경사하강법에 비해 갖는 특성으로 옳은 것은?</p>
<p class="q-ask">SGD의 특성은?</p>`,
hint:"SGD는 데이터 한 개(또는 미니배치)로 그래디언트를 추정합니다. 이때 발생하는 노이즈의 영향을 생각해보세요.",
opts:["항상 더 정확한 그래디언트를 계산한다",
"노이즈가 있지만 업데이트가 빈번하여 빠르게 수렴할 수 있고, 지역 최솟값 탈출에도 도움이 된다",
"메모리 사용량이 항상 더 크다",
"지역 최솟값에 빠지는 것을 완벽히 방지한다"],ans:1,
exp:"<strong>SGD</strong>의 특성:<br>• 1개(또는 소수) 샘플로 그래디언트 추정 → <strong>노이즈 있음</strong><br>• 업데이트가 빈번 → <strong>빠른 수렴</strong> 가능<br>• 노이즈가 지역 최솟값 <strong>탈출에 도움</strong> (완벽 보장은 아님)<br>• 메모리 효율적 (전체 데이터 안 올려도 됨)"},

{topic:"역전파 — 그래디언트 소실",d:2,
q:`<p>심층 신경망에서 <strong>그래디언트 소실(vanishing gradient)</strong> 문제가 가장 심한 활성화 함수는?</p>
<p class="q-ask">그래디언트 소실이 가장 심한 것은?</p>`,
hint:"각 활성화 함수의 미분값 범위를 생각해보세요. 미분값이 항상 1보다 작은 함수는?",
opts:["ReLU","Leaky ReLU","Sigmoid","ELU"],ans:2,
exp:"<strong>Sigmoid</strong>: σ'(x) = σ(x)(1−σ(x)), 최대값 0.25<br>→ 층이 깊어지면 0.25<sup>n</sup>으로 그래디언트가 <strong>기하급수적으로 감소</strong><br>• ReLU: 양의 영역에서 미분=1 → 소실 없음<br>• Leaky ReLU: 음의 영역에서도 작은 기울기 유지<br>• ELU: 음의 영역에서 부드러운 기울기 제공"},

{topic:"활성화 함수 — ReLU",d:2,
q:`<p>ReLU 함수 f(x) = max(0, x)에 대한 설명으로 옳지 않은 것은?</p>
<p class="q-ask">옳지 않은 설명은?</p>`,
hint:"ReLU의 수학적 정의와 x=0에서의 미분 가능성을 생각해보세요.",
opts:["양의 입력에 대해 그래디언트가 1이므로 그래디언트 소실이 완화된다",
"음의 입력에서 출력이 0이며, 'Dying ReLU' 문제가 발생할 수 있다",
"출력 범위는 [0, ∞)이다",
"x = 0에서 미분값이 항상 정확히 1이다"],ans:3,
exp:"ReLU는 x=0에서 <strong>미분 불가능</strong>(좌미분=0, 우미분=1)<br>실제 구현에서는 관례적으로 0으로 설정합니다.<br>• x > 0: f'(x) = 1 ✓ (그래디언트 소실 완화)<br>• x < 0: f'(x) = 0 → 학습 안 됨 → <strong>Dying ReLU</strong><br>• 출력 범위: [0, ∞) ✓"},

{topic:"손실 함수 — MSE vs MAE",d:2,
q:`<p>회귀 문제에서 MSE(Mean Squared Error) 대비 MAE(Mean Absolute Error)의 특성으로 옳은 것은?</p>
<p class="q-ask">MAE의 특성은?</p>`,
hint:"제곱은 큰 오차를 더 크게 반영하고, 절대값은 모든 오차를 동등하게 취급합니다.",
opts:["MAE는 이상치에 더 민감하다",
"MAE는 이상치에 더 강건(robust)하다",
"MAE의 그래디언트 크기는 오차에 비례하여 변한다",
"MSE와 MAE는 최적해가 항상 동일하다"],ans:1,
exp:"<strong>MSE</strong> = Σ(y−ŷ)² / n → 큰 오차에 제곱으로 가중 → <strong>이상치에 민감</strong><br><strong>MAE</strong> = Σ|y−ŷ| / n → 모든 오차 동등 취급 → <strong>이상치에 강건</strong><br>• MAE의 그래디언트는 ±1 (일정, 오차 크기와 무관)<br>• 이상치가 있으면 MSE와 MAE의 최적해가 달라질 수 있음"},

{topic:"Cross Entropy 계산",d:2,
q:`<p>3-클래스 분류에서 실제 레이블이 <code>[0, 1, 0]</code>(클래스 2)이고 모델의 softmax 출력이 <code>[0.1, 0.7, 0.2]</code>일 때, 교차 엔트로피 손실값에 가장 가까운 것은?</p>
<p class="q-ask">CE 손실값은?</p>`,
hint:"Cross Entropy = −Σ y_i · log(ŷ_i). 원-핫 레이블에서 정답 클래스의 확률에만 −log를 취합니다.",
opts:["0.10","0.36","0.70","1.00"],ans:1,
exp:"원-핫 레이블 [0, 1, 0]에서 정답 클래스(인덱스 1)의 예측 확률 = 0.7<br>CE = −log(0.7) ≈ −(−0.357) = <strong>0.357 ≈ 0.36</strong><br>• 예측이 정답에 가까울수록(확률 → 1) CE → 0<br>• 예측이 틀릴수록(확률 → 0) CE → ∞"},

/* ═══════════════════════════════════════════════════
   2-2. 딥러닝 (Q32 ~ Q40)
   ═══════════════════════════════════════════════════ */
{topic:"MLP — 비선형성",d:1,
q:`<p>MLP(다층 퍼셉트론)에서 <strong>비선형 활성화 함수</strong>를 사용하지 않으면 발생하는 현상으로 가장 옳은 것은?</p>
<p class="q-ask">활성화 함수 없이 여러 층을 쌓으면?</p>`,
hint:"행렬 곱의 결합법칙을 생각해보세요. W₂(W₁x) = (W₂W₁)x = W'x",
opts:["깊이를 아무리 깊게 해도 단일 선형 변환과 동등해진다",
"항상 더 좋은 성능을 낸다",
"그래디언트 소실 문제가 사라진다",
"자동으로 합성곱 신경망과 동등해진다"],ans:0,
exp:"비선형 활성화 없이 층을 쌓으면:<br>y = W₃(W₂(W₁x)) = (W₃W₂W₁)x = <strong>W'x</strong><br>→ 행렬 곱의 결합법칙에 의해 <strong>단일 선형 변환</strong>과 동일<br>비선형 함수(ReLU 등)를 넣어야만 깊은 층의 표현력이 증가합니다."},

{topic:"임베딩 — 파라미터 수",d:2,
q:`<p>어휘 크기가 10,000이고 임베딩 차원이 256일 때, <code>nn.Embedding(10000, 256)</code> 레이어의 학습 가능한 파라미터 수는?</p>
<p class="q-ask">파라미터 수는?</p>`,
hint:"Embedding 레이어는 내부적으로 (어휘 크기 × 임베딩 차원) 크기의 룩업 테이블(행렬)을 저장합니다.",
opts:["10,000","256","2,560,000","10,256"],ans:2,
exp:"<code>nn.Embedding(V, D)</code>의 파라미터는 <strong>V × D</strong> 크기의 가중치 행렬입니다.<br>10,000 × 256 = <strong>2,560,000</strong><br>각 토큰 ID를 인덱스로 사용하여 해당 행 벡터를 반환합니다.<br>bias는 없으므로 파라미터 수 = V × D"},

{topic:"Scaled Dot-Product Attention",d:2,
q:`<p>Scaled Dot-Product Attention <code class="math">softmax(QK<sup>T</sup> / √d<sub>k</sub>)V</code>에서 <code>√d<sub>k</sub></code>로 나누는 이유로 가장 옳은 것은?</p>
<p class="q-ask">스케일링의 이유는?</p>`,
hint:"d_k(Key의 차원)가 클 때 QK^T의 값이 어떻게 변하는지, softmax 입력이 매우 클 때 어떤 문제가 생기는지 생각해보세요.",
opts:["출력의 차원을 줄이기 위해서이다",
"d<sub>k</sub>가 클 때 내적값이 커져 softmax가 포화되는 것을 방지하기 위해서이다",
"그래디언트를 항상 1로 유지하기 위해서이다",
"행렬 곱이 정의되도록 차원을 맞추기 위해서이다"],ans:1,
exp:"d<sub>k</sub>가 크면 Q와 K의 내적값의 분산이 d<sub>k</sub>에 비례하여 증가합니다.<br>→ 큰 내적값 → softmax 출력이 <strong>원-핫에 가깝게 포화</strong><br>→ 그래디언트가 매우 작아짐<br>√d<sub>k</sub>로 나누면 분산이 1로 정규화되어 softmax가 적절히 작동합니다."},

{topic:"트랜스포머 — 위치 인코딩",d:2,
q:`<p>트랜스포머(Transformer)에서 <strong>위치 인코딩(Positional Encoding)</strong>이 필요한 이유로 옳은 것은?</p>
<p class="q-ask">위치 인코딩이 필요한 이유는?</p>`,
hint:"셀프 어텐션 연산 자체는 입력 순서를 어떻게 처리하는지 생각해보세요.",
opts:["셀프 어텐션은 순서 불변(permutation invariant)이라 토큰 위치를 알 수 없기 때문이다",
"학습 속도를 높이기 위해서이다",
"과대적합을 방지하기 위해서이다",
"어텐션 가중치를 정규화하기 위해서이다"],ans:0,
exp:"셀프 어텐션은 입력 토큰의 <strong>순서를 고려하지 않는</strong> 집합 연산입니다.<br>→ 'AB'와 'BA'가 동일한 결과를 낳음<br>위치 인코딩을 입력 임베딩에 더하면:<br>• 각 위치에 고유한 패턴이 부여<br>• 모델이 토큰 간 상대적/절대적 위치를 학습 가능"},

{topic:"오토인코더",d:2,
q:`<p>오토인코더를 이용한 <strong>이상 탐지(anomaly detection)</strong>의 원리로 옳은 것은?</p>
<p class="q-ask">오토인코더 기반 이상 탐지의 원리는?</p>`,
hint:"오토인코더는 입력을 압축했다가 복원합니다. 학습 데이터와 다른 패턴의 데이터가 들어오면?",
opts:["정상 데이터로 학습된 오토인코더는 이상 데이터에 대해 재구성 오차가 크다",
"이상 데이터로만 학습해야 한다",

{topic:"배치 정규화",d:2,

opts:["정규화된 값을 다시 적절한 분포로 복원할 수 있게 하여 모델의 표현력을 유지한다",

"그래디언트 폭발을 완전히 해결한다"],ans:0,
exp:"BN 과정: x̂ = (x − μ) / σ → y = <strong>γ</strong>x̂ + <strong>β</strong><br>• 정규화(평균 0, 분산 1)만 하면 → sigmoid/tanh의 선형 영역에 갇힐 수 있음<br>• γ, β로 <strong>필요시 원래 분포 복원 가능</strong><br>• γ=σ, β=μ이면 항등 변환 → 모델이 BN을 '무시'할 수도 있음<br>→ 표현력 손실 없이 정규화 효과 확보"},

"데이터가 선형 분리 가능할 때, 유한 반복 내에 올바른 가중치를 찾을 수 있다",
"비선형 데이터도 항상 분류할 수 있다",
"수렴 속도가 데이터 수와 무관하다"],ans:1,
exp:"<strong>퍼셉트론 수렴 정리</strong>:<br>• 전제: 데이터가 <strong>선형 분리 가능</strong>(linearly separable)<br>• 결론: 퍼셉트론 알고리즘은 <strong>유한 반복</strong> 내에 모든 학습 데이터를 올바르게 분류하는 가중치를 찾음<br>• 비선형 분리 데이터에서는 수렴을 보장하지 않음<br>• 마진(margin)이 클수록 수렴이 빠름"},

{topic:"커널 트릭 — 다항식",d:2,
q:`<p>SVM에서 다항식 커널 <code class="math">K(x, y) = (x·y + c)<sup>d</sup></code>를 사용할 때, 하이퍼파라미터 <code>d</code>를 증가시키면 발생하는 현상은?</p>
<p class="q-ask">d를 키우면 어떻게 되는가?</p>`,
hint:"d는 다항식의 차수입니다. 차수가 높을수록 더 복잡한 결정 경계를 만들 수 있지만...",
opts:["결정 경계가 더 단순해지고 과소적합 위험이 증가한다",
"더 복잡한 결정 경계를 학습할 수 있지만 과대적합 위험이 증가한다",
"커널 함수의 계산 비용이 감소한다",
"항상 성능이 향상된다"],ans:1,
exp:"다항식 커널의 차수 d를 증가시키면:<br>• 더 <strong>고차원의 특성 공간</strong>으로 매핑됨<br>• <strong>복잡한 비선형 결정 경계</strong> 학습 가능<br>• 그러나 모델 복잡도 증가 → <strong>과대적합 위험 증가</strong><br>• 계산 비용도 증가<br>적절한 d 선택을 위해 교차검증이 필요합니다."},

{topic:"증분 학습",d:2,
q:`<p>scikit-learn에서 <code>partial_fit()</code> 메서드를 지원하는 증분 학습(incremental learning)의 장점으로 옳은 것은?</p>
<p class="q-ask">증분 학습의 주요 장점은?</p>`,
hint:"데이터가 메모리에 한 번에 들어가지 않을 정도로 큰 경우를 생각해보세요.",
opts:["전체 데이터를 메모리에 올리지 않고 배치 단위로 학습할 수 있다",
"항상 배치 학습보다 성능이 좋다",
"하이퍼파라미터 튜닝이 불필요하다",
"모든 scikit-learn 모델이 지원한다"],ans:0,
exp:"<strong>증분 학습(Incremental Learning)</strong>:<br>• <code>partial_fit()</code>으로 <strong>배치 단위 학습</strong> 가능<br>• 대용량 데이터를 메모리에 한번에 올리지 않아도 됨<br>• 새로운 데이터가 들어올 때 기존 모델을 업데이트 가능<br>• SGDClassifier, MiniBatchKMeans 등이 지원<br>• 모든 모델이 지원하는 것은 아님"},

{topic:"Huber 손실",d:2,
q:`<p>Huber 손실(Huber Loss)에 대한 설명으로 옳은 것은?</p>
<p class="q-ask">Huber 손실의 특성은?</p>`,
hint:"Huber 손실은 MSE와 MAE의 장점을 결합한 손실 함수입니다. 작은 오차와 큰 오차를 다르게 처리합니다.",
opts:["항상 MAE와 동일하게 동작한다",
"오차가 작을 때는 MSE처럼, 클 때는 MAE처럼 동작하여 이상치에 강건하다",
"미분 불가능한 점이 존재하여 경사하강법에 사용할 수 없다",
"분류 문제에만 사용할 수 있다"],ans:1,
exp:"<strong>Huber 손실</strong>은 임계값 δ를 기준으로:<br>• |e| ≤ δ: <strong>0.5e²</strong> (MSE처럼 매끄러운 2차 함수)<br>• |e| > δ: <strong>δ|e| - 0.5δ²</strong> (MAE처럼 선형)<br>→ 작은 오차는 정밀하게, 큰 오차(이상치)는 선형으로 처리<br>→ MSE보다 <strong>이상치에 강건</strong>하면서도 MAE보다 매끄러운 최적화 가능"},

{topic:"모델 선택 AIC/BIC",d:3,
q:`<p>AIC(Akaike Information Criterion)와 BIC(Bayesian Information Criterion)의 비교로 옳은 것은?</p>
<p class="q-ask">AIC와 BIC의 차이점은?</p>`,
hint:"BIC의 패널티 항은 데이터 수 n에 의존하지만, AIC의 패널티는 n에 독립적입니다.",
opts:["AIC는 항상 BIC보다 더 복잡한 모델을 선호한다",
"BIC는 데이터 수가 많을수록 복잡한 모델에 더 강한 패널티를 부과한다",
"AIC와 BIC는 수학적으로 동일한 기준이다",
"BIC는 모델의 파라미터 수를 고려하지 않는다"],ans:1,
exp:"<strong>AIC</strong> = 2k − 2ln(L), <strong>BIC</strong> = k·ln(n) − 2ln(L)<br>• k: 파라미터 수, n: 데이터 수, L: 최대 우도<br>• BIC의 패널티: k·ln(n) → <strong>n이 크면 패널티가 커짐</strong><br>• AIC의 패널티: 2k → n에 독립<br>• n > 8일 때 BIC가 AIC보다 강한 패널티 → 더 간결한 모델 선호"},

{topic:"임계값 최적화",d:1,
q:`<p>이진 분류에서 분류 임계값(threshold)을 0.5에서 0.3으로 낮추면 일반적으로 어떤 변화가 나타나는가?</p>
<p class="q-ask">임계값을 낮추면?</p>`,
hint:"임계값이 낮아지면 양성으로 분류되는 샘플이 더 많아집니다.",
opts:["정밀도(Precision)가 높아지고 재현율(Recall)이 낮아진다",
"정밀도(Precision)가 낮아지고 재현율(Recall)이 높아진다",
"정밀도와 재현율 모두 높아진다",
"정밀도와 재현율 모두 낮아진다"],ans:1,
exp:"임계값을 0.5 → 0.3으로 낮추면:<br>• 양성 예측이 더 많아짐 → 실제 양성을 더 많이 포착 → <strong>Recall ↑</strong><br>• 동시에 거짓 양성(FP)도 증가 → <strong>Precision ↓</strong><br>이것이 <strong>Precision-Recall 트레이드오프</strong>입니다.<br>질병 진단 등 재현율이 중요한 경우 임계값을 낮출 수 있습니다."},

/* ═══════════════════════════════════════════════════
   1-3. 비지도학습 (Q14 ~ Q18)
   ═══════════════════════════════════════════════════ */
{topic:"Affinity Propagation",d:2,
q:`<p>Affinity Propagation 군집화에 대한 설명으로 옳은 것은?</p>
<p class="q-ask">Affinity Propagation의 특성은?</p>`,
hint:"이 알고리즘은 각 데이터 포인트가 다른 포인트에게 '메시지'를 보내는 방식으로 작동합니다.",
opts:["군집 수 K를 미리 지정해야 한다",
"데이터 포인트 간 메시지 전달(message passing)로 대표점(exemplar)을 자동 선택한다",
"K-means보다 항상 빠르다",
"유사도 행렬을 사용하지 않는다"],ans:1,
exp:"<strong>Affinity Propagation</strong>:<br>• <strong>K를 미리 지정하지 않음</strong> — 자동으로 군집 수 결정<br>• Responsibility와 Availability <strong>메시지를 반복 전달</strong><br>• 각 군집의 <strong>대표점(exemplar)</strong>은 실제 데이터 포인트<br>• 단점: O(n²) 메모리/시간 → 대규모 데이터에 비효율적<br>• preference 파라미터로 군집 수 간접 조절 가능"},

{topic:"자기 조직화 지도",d:3,
q:`<p>자기 조직화 지도(SOM, Self-Organizing Map)에 대한 설명으로 옳은 것은?</p>
<p class="q-ask">SOM의 특성은?</p>`,
hint:"SOM은 고차원 데이터를 저차원(보통 2D) 격자로 매핑하는 비지도 학습 방법입니다.",
opts:["지도학습 알고리즘으로 레이블이 반드시 필요하다",
"고차원 데이터의 위상(topology)을 보존하면서 저차원 격자로 매핑하는 비지도 학습이다",
"t-SNE와 완전히 동일한 알고리즘이다",
"항상 정확한 군집 경계를 제공한다"],ans:1,
exp:"<strong>SOM (Self-Organizing Map)</strong>:<br>• 코호넨(Kohonen) 네트워크라고도 함<br>• <strong>비지도 학습</strong>으로 레이블 불필요<br>• 고차원 데이터의 <strong>위상적 구조(topology)를 보존</strong>하면서 2D 격자로 매핑<br>• 경쟁 학습(competitive learning): 각 입력에 대해 가장 유사한 노드(BMU) 선택<br>• t-SNE와 달리 학습된 맵이 고정되어 새 데이터에 적용 가능"},

{topic:"인자 분석 vs PCA",d:2,
q:`<p>인자 분석(Factor Analysis)과 PCA의 비교로 옳은 것은?</p>
<p class="q-ask">옳은 비교는?</p>`,
hint:"PCA는 분산 최대화 방향을 찾고, 인자 분석은 관측 변수 뒤의 잠재 인자를 추정합니다.",
opts:["PCA와 인자 분석은 수학적으로 동일한 방법이다",
"인자 분석은 관측 변수를 잠재 인자(latent factor)로 설명하며, 고유 분산(unique variance)을 분리한다",
"PCA는 확률 모델을 가정하고 인자 분석은 가정하지 않는다",
"인자 분석은 차원 축소에 사용할 수 없다"],ans:1,
exp:"<strong>인자 분석(FA)</strong> vs <strong>PCA</strong>:<br>• FA: 확률 모델 가정, 잠재 인자 + <strong>고유 분산(noise)</strong> 분리<br>• PCA: 분산 최대화 방향, 확률 모델 없음<br>• FA는 공통 분산과 고유 분산을 구분하여 해석력이 높음<br>• PCA는 총 분산을 설명하는 주성분을 찾음<br>• FA도 차원 축소에 활용 가능"},

{topic:"바이클러스터링",d:3,
q:`<p>바이클러스터링(Biclustering)에 대한 설명으로 옳은 것은?</p>
<p class="q-ask">바이클러스터링의 특성은?</p>`,
hint:"'바이(bi)'는 두 방향을 의미합니다. 행과 열을 동시에 군집화하는 방법입니다.",
opts:["행(샘플)만 군집화하는 방법이다",
"행과 열을 동시에 군집화하여 데이터 행렬의 부분 블록(submatrix)을 찾는다",
"K-means의 다른 이름이다",
"반드시 정방행렬(square matrix)에서만 사용 가능하다"],ans:1,
exp:"<strong>바이클러스터링(Biclustering)</strong>:<br>• 행과 열을 <strong>동시에 군집화</strong>하여 유사한 패턴의 부분 행렬을 발견<br>• 유전자 발현 데이터 분석에서 유용 (유전자 × 조건)<br>• Spectral Biclustering, Spectral Co-clustering 등의 알고리즘<br>• scikit-learn의 <code>SpectralBiclustering</code>으로 구현 가능<br>• 행이나 열이 여러 바이클러스터에 속할 수 있음"},

{topic:"오토인코더 이상 탐지",d:1,
q:`<p>오토인코더 기반 이상 탐지에서 이상(anomaly)을 판별하는 기준으로 가장 적합한 것은?</p>
<p class="q-ask">이상 판별 기준은?</p>`,
hint:"오토인코더는 정상 데이터의 패턴을 학습하여 입력을 복원합니다. 이상 데이터는 잘 복원되지 않습니다.",
opts:["잠재 공간(latent space)의 차원 수",
"재구성 오차(reconstruction error)가 임계값을 초과하는지 여부",
"인코더의 가중치 크기",
"학습 에포크(epoch) 수"],ans:1,
exp:"오토인코더 이상 탐지 원리:<br>① <strong>정상 데이터</strong>로만 학습 → 정상 패턴의 재구성을 잘 수행<br>② 이상 데이터 입력 시 → 학습하지 않은 패턴 → <strong>재구성 오차 큼</strong><br>③ 오차가 임계값 초과 시 이상으로 분류<br>임계값은 검증 데이터의 재구성 오차 분포로 결정"},

/* ═══════════════════════════════════════════════════
   1-4. 데이터 사이언스 기초 (Q19 ~ Q25)
